<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#1f4e79">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="manifest" href="manifest.json">
<link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192.png">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<title>선입금대장</title>
<style>
:root{--bg:#f0f2f5;--card:#fff;--line:#e1e5ea;--text:#1b2838;--muted:#5f6d7e;--primary:#1a5276;--primary-soft:#e6f0f8;--primary-glow:rgba(26,82,118,.08);--danger:#c0392b;--danger-soft:#fef0ee;--warn:#c05621;--warn-soft:#fef6ee;--success:#0e7a46;--success-soft:#edf8f2;--shadow:0 1px 4px rgba(15,23,42,.06),0 1px 2px rgba(15,23,42,.03);--shadow-md:0 4px 12px rgba(15,23,42,.08);--shadow-lg:0 12px 32px rgba(15,23,42,.12);--radius:14px}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}html,body{margin:0;padding:0;overscroll-behavior:none;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Malgun Gothic","Apple SD Gothic Neo","Segoe UI",sans-serif;-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale}body{min-height:100vh}button,input,select{font:inherit}button{border:none;cursor:pointer;border-radius:12px;min-height:52px;transition:transform .1s,opacity .12s}button:active{transform:scale(.97);opacity:.82}input,select{width:100%;min-height:52px;padding:13px 16px;border:1.5px solid var(--line);border-radius:12px;background:#fff;transition:border-color .2s,box-shadow .2s}input:focus,select:focus{border-color:var(--primary);box-shadow:0 0 0 3px var(--primary-glow);outline:none}

/* ─── 레이아웃 ─── */
.app{max-width:900px;margin:0 auto;padding:16px 16px 90px}
.top{position:sticky;top:0;z-index:10;background:rgba(240,242,245,.88);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);padding:14px 0 12px;border-bottom:1px solid rgba(225,229,234,.5)}
.title{display:flex;gap:10px;align-items:start;justify-content:space-between}
.title h1{margin:0;font-size:22px;font-weight:800;letter-spacing:-.4px;background:linear-gradient(135deg,var(--primary),#2874a6);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.sub{margin-top:3px;color:var(--muted);font-size:12px;letter-spacing:.2px}
.tool{display:flex;gap:6px;flex-wrap:wrap}
.tool button{min-height:38px;padding:0 13px;font-size:13px;font-weight:700;border-radius:10px}

/* ─── 버튼 ─── */
.btn{background:#fff;border:1.5px solid var(--line);color:var(--text)}
.btn-primary{background:linear-gradient(135deg,var(--primary),#1e6fa1);color:#fff;border:none;box-shadow:0 2px 6px rgba(26,82,118,.2)}
.btn-secondary{background:var(--primary-soft);color:var(--primary);border:1.5px solid #ccdce8}
.btn-danger{background:var(--danger);color:#fff;border:none}
.btn-warn{background:var(--warn-soft);color:var(--warn);border:1.5px solid #e8c9a0}

/* ─── 카드 ─── */
.stack{display:grid;gap:10px}
.card{background:var(--card);border:1px solid rgba(225,229,234,.7);border-radius:var(--radius);box-shadow:var(--shadow);padding:16px}
.banner{border-left:4px solid}
.banner.warn{background:var(--warn-soft);border-left-color:var(--warn)}
.banner.error{background:var(--danger-soft);border-left-color:var(--danger)}
.settings-card{display:grid;gap:12px}
.section-head{display:flex;justify-content:space-between;align-items:flex-start;gap:12px;margin-bottom:2px}
.section-title{font-size:20px;font-weight:800;line-height:1.25;color:var(--text)}
.section-kicker{font-size:12px;color:var(--muted);font-weight:700;line-height:1.5}
.section-actions{display:grid;gap:8px}
.action-btn{display:flex;gap:10px;align-items:flex-start;text-align:left;justify-content:flex-start;padding:13px 14px;min-height:58px}
.action-btn .action-icon{width:24px;flex:0 0 24px;text-align:center;font-size:17px;line-height:1.25}
.action-btn strong{display:block;font-size:14px;line-height:1.35}
.action-btn span{display:block;margin-top:2px;font-size:11px;font-weight:400;color:var(--muted);line-height:1.45}
.inline-form{display:flex;gap:8px;align-items:center}
.inline-form input{min-width:0}
.inline-form button{flex:0 0 auto;min-width:84px}
.agency-current{display:flex;justify-content:space-between;align-items:center;gap:10px;padding:10px 12px;background:#fafbfd;border:1px solid var(--line);border-radius:10px}
.agency-current-name{font-size:17px;font-weight:800;color:var(--primary);line-height:1.3}
.dept-tags{line-height:2;max-height:140px;overflow:auto;padding:8px;border:1px solid var(--line);border-radius:10px;background:#fff}
.danger-note{font-size:11px;color:var(--danger);line-height:1.5}
@media (max-width:520px){.section-head{display:grid}.inline-form{display:grid}.inline-form button{width:100%}.agency-current{align-items:flex-start}.action-btn{padding:12px}}

/* ─── 부서 그룹 ─── */
.group{display:grid;gap:8px}
.group-head{display:flex;justify-content:space-between;gap:12px;align-items:center;padding-bottom:8px;border-bottom:1.5px solid #eef1f4}
.group-title{font-size:18px;font-weight:800;letter-spacing:-.2px;color:var(--primary)}
.group-meta{color:var(--muted);font-size:12px;font-weight:600}

/* ─── 직원 카드 ─── */
.employee{display:grid;gap:10px}
.employee-main{cursor:pointer;border-radius:10px;padding:4px;margin:-4px;transition:background .15s}
.employee-main:active{background:var(--primary-soft)}
.name{font-size:17px;font-weight:800;line-height:1.3;letter-spacing:-.2px}
.dept,.meta,.note{color:var(--muted);font-size:12px;line-height:1.5}
.bal{margin-top:0;font-size:24px;font-weight:800;color:var(--primary);letter-spacing:-.5px}
.bal.zero{color:#a0aab4}
.bal.negative{color:var(--danger)}

/* ─── 요약/액션 ─── */
.actions{display:flex;gap:8px;flex-wrap:wrap}
.actions button{flex:1;min-width:100px;font-size:16px;font-weight:700}
.summary{display:flex;justify-content:space-between;align-items:center;gap:10px;font-size:15px;font-weight:700;padding:6px 4px;background:var(--primary-soft);border-radius:10px;margin-top:4px}
.summary .v{color:var(--primary);font-size:19px;letter-spacing:-.3px;font-weight:800}
.empty{text-align:center;color:var(--muted);padding:32px 16px;line-height:1.7;font-size:15px}

/* ─── 거래 이력 ─── */
.list{display:grid;gap:8px}
.txn{display:grid;gap:6px;padding:10px 0;border-bottom:1px solid #f0f2f5}
.txn:last-child{border-bottom:none}
.txn-top{display:flex;justify-content:space-between;gap:10px;align-items:start}
.txn-title{font-size:15px;font-weight:700;line-height:1.4}
.amt{font-size:20px;font-weight:800;white-space:nowrap;letter-spacing:-.3px}
.amt.in{color:var(--success)}
.amt.out{color:var(--danger)}
.amt.adjust{color:var(--warn)}
.chips{display:flex;gap:6px;flex-wrap:wrap;font-size:12px;color:var(--muted)}
.chip{padding:3px 8px;border-radius:999px;background:var(--primary-soft);color:var(--primary);font-weight:600;font-size:11px}
.thumb{width:80px;height:44px;object-fit:contain;border:1px solid var(--line);border-radius:8px;background:#fff;cursor:pointer;transition:border-color .15s}
.thumb:active{border-color:var(--primary)}

/* ─── 직원 관리 행 ─── */
.row{display:flex;justify-content:space-between;gap:12px;align-items:center;padding:10px 0;border-bottom:1px solid #eef1f4}
.row:last-child{border-bottom:0}
.row .left{flex:1;min-width:0}
.row .right{display:flex;gap:5px;flex-wrap:wrap;justify-content:flex-end}
.small{min-height:36px;padding:0 10px;border:1.5px solid var(--line);background:#fff;font-size:12px;font-weight:700;border-radius:8px}
.hidden-badge{display:inline-flex;align-items:center;padding:2px 7px;border-radius:999px;background:#eef1f4;color:var(--muted);font-size:11px;font-weight:700;margin-left:4px}

/* ─── 하단 탭 ─── */
.nav{position:fixed;left:0;right:0;bottom:0;max-width:900px;margin:0 auto;display:flex;background:rgba(255,255,255,.96);border-top:1px solid rgba(225,229,234,.8);box-shadow:0 -2px 8px rgba(15,23,42,.04);z-index:20;padding-bottom:env(safe-area-inset-bottom,0);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px)}
.nav button{flex:1;min-height:58px;border-radius:0;background:transparent;color:#a0aab4;font-size:11px;font-weight:700;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;transition:color .15s}
.nav button:active{transform:none;opacity:1}
.nav button.active{color:var(--primary)}
.nav button svg{width:22px;height:22px;stroke-width:2;fill:none;stroke:currentColor}

/* ─── 모달 ─── */
.modal-back{position:fixed;inset:0;background:rgba(15,23,42,.45);display:flex;align-items:center;justify-content:center;padding:16px;z-index:40;backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px)}
.modal{width:min(100%,640px);max-height:calc(100vh - 32px);overflow:auto;background:#fff;border-radius:18px;box-shadow:var(--shadow-lg);padding:20px}
.modal h2{margin:0 0 4px;font-size:20px;font-weight:800;letter-spacing:-.3px}
.help{margin:0 0 14px;color:var(--muted);font-size:13px;line-height:1.6}
.field{display:grid;gap:4px}
.field label{font-size:12px;color:var(--muted);font-weight:700;text-transform:uppercase;letter-spacing:.3px}
.form{display:grid;gap:12px}
.quick{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:8px}
.quick button{font-size:16px;font-weight:700;background:var(--primary-soft);color:var(--primary);border:1.5px solid #ccdce8}
.receipt{display:grid;gap:6px;padding:14px;border:1.5px solid var(--line);border-radius:12px;background:#fafbfd;margin-bottom:12px}
.receipt-row{display:flex;justify-content:space-between;gap:12px;font-size:15px}
.signature{width:100%;height:180px;display:block;background:#fff;touch-action:none}
.sig-box{border:1.5px solid var(--line);border-radius:12px;overflow:hidden}
.modal-actions{display:flex;gap:8px;flex-wrap:wrap;margin-top:16px}
.modal-actions button{flex:1;font-size:16px;font-weight:700}

/* ─── 토스트/로딩 ─── */
.toast{position:fixed;left:50%;top:16px;transform:translateX(-50%);max-width:calc(100vw - 32px);padding:12px 20px;border-radius:14px;background:rgba(27,40,56,.9);color:#fff;box-shadow:var(--shadow-lg);z-index:60;text-align:center;line-height:1.4;font-size:14px;font-weight:600;backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px)}
.busy{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:rgba(255,255,255,.65);z-index:70;backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px)}
.busy>div{background:#fff;padding:24px 36px;border-radius:18px;box-shadow:var(--shadow-lg);font-size:16px;font-weight:700;text-align:center}

/* ─── CSV 미리보기 ─── */
.csv-preview{max-height:280px;overflow-y:auto;margin:12px 0;border:1px solid var(--line);border-radius:10px}
.csv-table{width:100%;border-collapse:collapse;font-size:12px}
.csv-table th{background:var(--primary);color:#fff;padding:8px 10px;text-align:left;position:sticky;top:0;font-weight:600;font-size:11px;text-transform:uppercase;letter-spacing:.3px}
.csv-table td{padding:7px 10px;border-bottom:1px solid #eef1f4}
.csv-table tr.err{background:var(--danger-soft)}
.csv-table tr.err td{color:var(--danger)}

/* ─── 부서 태그/선택 ─── */
.dept-tag{display:inline-flex;align-items:center;gap:4px;padding:4px 10px;border-radius:999px;background:var(--primary-soft);color:var(--primary);font-size:12px;font-weight:600;margin:3px}
.dept-tag button{background:none;border:none;color:var(--danger);font-size:15px;min-height:auto;padding:0 2px;cursor:pointer;border-radius:0}
.dept-picks{display:flex;flex-wrap:wrap;gap:5px;margin-top:6px;max-height:130px;overflow-y:auto}
.dept-pick{padding:5px 11px;border-radius:999px;background:#fff;border:1.5px solid var(--line);color:var(--muted);font-size:12px;font-weight:600;cursor:pointer;white-space:nowrap;transition:all .15s}
.dept-pick.on{background:var(--primary-soft);border-color:var(--primary);color:var(--primary)}
.dept-pick:active{transform:scale(.95)}
.agency-tools{display:grid;gap:8px;margin-top:8px}
.agency-actions{display:flex;gap:8px;flex-wrap:wrap}
.agency-actions button{min-height:38px;font-size:12px;font-weight:700;flex:1}
.dept-checks{display:grid;grid-template-columns:repeat(auto-fit,minmax(132px,1fr));gap:6px;max-height:220px;overflow:auto;padding:8px;border:1px solid var(--line);border-radius:10px;background:#fafbfd}
.dept-check{display:flex;gap:6px;align-items:center;min-height:32px;padding:5px 7px;border-radius:8px;background:#fff;font-size:12px;font-weight:700;color:var(--text);border:1px solid #eef1f4}
.dept-check input{width:auto;min-height:auto;margin:0;accent-color:var(--primary)}

/* ─── 직원 관리 아코디언 ─── */
.mgr-group{border-bottom:1px solid #eef1f4}
.mgr-group:last-child{border-bottom:none}
.mgr-head{display:flex;align-items:center;gap:8px;padding:11px 4px;cursor:pointer;font-weight:700;border-radius:8px;transition:background .15s}
.mgr-head:active{background:var(--bg)}
.mgr-toggle{font-size:10px;color:var(--muted);width:16px;text-align:center;flex-shrink:0}
.mgr-dept{font-size:14px;flex:1}
.mgr-count{font-size:12px;color:var(--muted);font-weight:600}
.mgr-body{padding:0 0 4px 20px}

/* ─── PIN 화면 ─── */
.pin-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:24px;background:linear-gradient(160deg,#f0f2f5 0%,#e6eaf0 100%)}
.pin-icon{width:48px;height:48px;border-radius:14px;background:linear-gradient(135deg,var(--primary),#2874a6);display:flex;align-items:center;justify-content:center;margin-bottom:16px;box-shadow:0 4px 12px rgba(26,82,118,.25)}
.pin-icon svg{width:24px;height:24px;stroke:#fff;fill:none;stroke-width:2}
.pin-title{font-size:20px;font-weight:800;margin-bottom:4px;color:var(--text);letter-spacing:-.3px}
.pin-sub{font-size:13px;color:var(--muted);margin-bottom:28px;text-align:center;line-height:1.5}
.pin-dots{display:flex;gap:14px;margin-bottom:32px}
.pin-dot{width:14px;height:14px;border-radius:50%;border:2px solid #c8ced6;background:#fff;transition:all .2s}
.pin-dot.filled{background:var(--primary);border-color:var(--primary);transform:scale(1.15)}
.pin-dot.error{background:var(--danger);border-color:var(--danger);animation:shake .3s}
.pin-pad{display:grid;grid-template-columns:repeat(3,68px);gap:10px;justify-content:center}
.pin-key{width:68px;height:68px;border-radius:50%;background:#fff;border:1px solid #dce0e6;font-size:22px;font-weight:700;display:flex;align-items:center;justify-content:center;min-height:auto;box-shadow:0 1px 3px rgba(0,0,0,.04);transition:all .1s}
.pin-key:active{background:var(--primary-soft);border-color:var(--primary);transform:scale(.93)}
.pin-key.fn{background:transparent;border:none;font-size:14px;color:var(--muted);font-weight:600;box-shadow:none}
.pin-key.fn:active{background:var(--bg);transform:scale(.95)}
.pin-msg{margin-top:18px;font-size:13px;color:var(--danger);text-align:center;min-height:20px;font-weight:600}
.pin-reset{margin-top:20px;text-align:center}
.pin-reset button{min-height:auto;padding:8px 16px;font-size:12px;color:var(--muted);background:none;border:1px solid var(--line);border-radius:8px}
@keyframes shake{0%,100%{transform:translateX(0)}20%,60%{transform:translateX(-4px)}40%,80%{transform:translateX(4px)}}
@media(max-width:640px){.quick{grid-template-columns:1fr}.actions button,.modal-actions button{min-width:100%}.summary,.txn-top,.receipt-row,.row,.group-head{display:grid}.tool{width:100%}.tool button{flex:1}}

/* ─── 초기 설정 ─── */
.setup{max-width:900px;margin:0 auto;padding:24px 16px 40px}
.setup-head{text-align:center;margin-bottom:24px}
.setup-head h1{font-size:22px;font-weight:800;margin:0 0 4px;background:linear-gradient(135deg,var(--primary),#2874a6);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.setup-head p{color:var(--muted);font-size:13px;margin:0;line-height:1.6}
.setup-step{display:inline-block;padding:4px 14px;border-radius:999px;background:var(--primary-soft);color:var(--primary);font-size:12px;font-weight:700;margin-bottom:12px}
.result-list{display:grid;gap:8px;max-height:400px;overflow-y:auto}
.result-card{padding:12px;border-radius:10px;border:1.5px solid var(--line);background:#fff;cursor:pointer;transition:all .15s}
.result-card:active{transform:scale(.98)}
.result-card.selected{border-color:var(--primary);background:var(--primary-soft)}
.result-card .r-name{font-size:15px;font-weight:700}
.result-card .r-addr{font-size:12px;color:var(--muted);margin-top:2px;line-height:1.4}
.result-card .r-tel{font-size:12px;color:var(--primary);margin-top:2px}
.result-card .r-type{font-size:11px;color:var(--muted)}
.setup-selected{border:2px solid var(--primary);background:var(--primary-soft);border-radius:12px;padding:14px}
</style>
</head>
<body>
<div id="app"></div>
<input id="restoreFile" type="file" accept="application/json,.json" hidden>
<input id="csvFile" type="file" accept=".csv,.txt" hidden>
<script>
(()=>{
'use strict';
const APP='선입금대장',APP_VERSION='1.0.0-beta.8',DB='prepaid-ledger-db',VER=3,LOCAL='prepaid-ledger-local',now=()=>Date.now(),qs=i=>document.getElementById(i);
const DEFAULT_ORG='기관/단체';
const DEFAULT_DEPTS=['사무실','관리팀','현장팀','영업팀'];
const COMMON_DEPTS=[...DEFAULT_DEPTS];
const state={loaded:false,mode:'준비 중',screen:'home',search:'',deptFilter:'',historyTab:'date',historyEmployeeId:'',modal:null,toast:'',toastTimer:null,busy:'',expandedDepts:{},pinLocked:true,pinInput:'',pinFails:0,pinMode:'',pinSetup1:'',pinMsg:'',backupConfirmed:false,setupStep:1,setupSelected:null,setupDepts:[],agencyData:null,agencyError:'',agencySelected:'',data:{employees:[],transactions:[],meta:{lastBackupAt:null,orgName:DEFAULT_ORG,shopName:'',departments:[...DEFAULT_DEPTS]}}};
let repo,signPad=null;
document.addEventListener('click',onClick);document.addEventListener('input',onInput);document.addEventListener('change',onInput);qs('restoreFile').addEventListener('change',onRestoreFile);qs('csvFile').addEventListener('change',onCsvFile);
let composing=false;document.addEventListener('compositionstart',()=>{composing=true});document.addEventListener('compositionend',(e)=>{composing=false;onInput(e)});
document.addEventListener('keydown',function(e){if(e.key==='Enter'){if(e.target.id==='setupNewDept'){e.preventDefault();var b2=document.querySelector('[data-a="setup-add-dept"]');if(b2)b2.click()}if(e.target.id==='newDeptInput'){e.preventDefault();var b3=document.querySelector('[data-a="add-dept"]');if(b3)b3.click()}if(e.target.id==='setupManualName'||e.target.id==='setupManualAddr'||e.target.id==='setupManualTel'){e.preventDefault();var b4=document.querySelector('[data-a="setup-manual-save"]');if(b4)b4.click()}}});
init();

// ── 유틸리티 ──
function num(v){const n=Number(v);return Number.isFinite(n)?n:0}
function parseWon(v){const s=String(v==null?'':v).replace(/,/g,'').replace(/원/g,'').replace(/\s/g,'').trim();if(!s)return NaN;const n=Number(s);if(!Number.isFinite(n))return NaN;if(!Number.isInteger(n))return NaN;return n}
function numTime(v){const n=Number(v);return Number.isFinite(n)&&n>0?n:now()}
function str(v){return typeof v==='string'?v.trim():''}
function sigD(v){return typeof v==='string'&&/^data:image\//.test(v)?v:''}
function uid(){return 'id-'+Date.now().toString(36)+'-'+Math.random().toString(36).slice(2,9)}
function esc(v){return String(v||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;')}
function money(v){return num(v).toLocaleString('ko-KR')+'원'}
function dt(ts){if(!ts)return '-';const d=new Date(ts),y=d.getFullYear(),m=String(d.getMonth()+1).padStart(2,'0'),dd=String(d.getDate()).padStart(2,'0'),h=String(d.getHours()).padStart(2,'0'),mi=String(d.getMinutes()).padStart(2,'0');return `${y}.${m}.${dd} ${h}:${mi}`}
function sameDay(a,b){if(!a||!b)return false;const x=new Date(a),y=new Date(b);return x.getFullYear()===y.getFullYear()&&x.getMonth()===y.getMonth()&&x.getDate()===y.getDate()}

// ── tx 무결성 체인 (스펙 §4.3) ──
function chainTip(){let last=null;for(const t of state.data.transactions){if(!last||t.createdAt>last.createdAt||(t.createdAt===last.createdAt&&t.id>last.id))last=t}return last&&last.txHash?last.txHash:''}
function txHashOf(employeeId,amount,afterBalance,prevHash,createdAt){return hash(String(employeeId)+'|'+num(amount)+'|'+num(afterBalance)+'|'+(prevHash||'')+'|'+createdAt)}
async function makeTx(f,prevTip){const createdAt=numTime(f.createdAt),prevHash=prevTip!=null?prevTip:chainTip();const tx={id:f.id||uid(),employeeId:f.employeeId||'',type:f.type||'use',amount:num(f.amount),beforeBalance:num(f.beforeBalance),afterBalance:num(f.afterBalance),reason:str(f.reason),note:str(f.note),targetTransactionId:f.targetTransactionId||null,signatureData:sigD(f.signatureData),signatureHash:str(f.signatureHash),prevHash,txHash:'',createdAt};tx.txHash=await txHashOf(tx.employeeId,tx.amount,tx.afterBalance,prevHash,createdAt);return tx}
async function verifyChain(){const txs=[...state.data.transactions].sort((a,b)=>a.createdAt-b.createdAt||(a.id<b.id?-1:a.id>b.id?1:0));let prev='',checked=0;const broken=[],legacy=[];for(const t of txs){if(!t.txHash){legacy.push(t.id);prev='';continue}const expect=await txHashOf(t.employeeId,t.amount,t.afterBalance,t.prevHash||'',t.createdAt);if(expect!==t.txHash)broken.push({id:t.id,reason:'해시 변조'});else if((t.prevHash||'')!==prev)broken.push({id:t.id,reason:'체인 단절'});checked++;prev=t.txHash}return{checked,broken,legacy:legacy.length,ok:broken.length===0}}

// ── 암호 모듈 (스펙 §4.1, §4.2) : RSA-OAEP 키페어 + AES-GCM 래핑 ──
function cryptoOk(){return !!(window.crypto&&window.crypto.subtle&&window.crypto.getRandomValues)}
function bufToB64(buf){let s='';const b=new Uint8Array(buf);for(let i=0;i<b.length;i++)s+=String.fromCharCode(b[i]);return btoa(s)}
function b64ToBuf(b64){const s=atob(b64),u=new Uint8Array(s.length);for(let i=0;i<s.length;i++)u[i]=s.charCodeAt(i);return u.buffer}
function randBytes(n){const u=new Uint8Array(n);crypto.getRandomValues(u);return u}

async function wrapPrivateKey(priv,passphrase){const pkcs8=bufToB64(await crypto.subtle.exportKey('pkcs8',priv));return aesEncryptStr(pkcs8,passphrase)}

async function ensureKeyPair(){if(!cryptoOk())return;const m=state.data.meta;let secret=m.deviceSecret;if(!secret)secret=bufToB64(randBytes(32));if(m.pubKey&&m.privKeyWrapped&&m.deviceSecret)return;const kp=await genKeyPair(),pubKey=bufToB64(await crypto.subtle.exportKey('spki',kp.publicKey)),privKeyWrapped=await wrapPrivateKey(kp.privateKey,secret),keyCreatedAt=now();await repo.apply({meta:{deviceSecret:secret,pubKey,privKeyWrapped,keyCreatedAt}});m.deviceSecret=secret;m.pubKey=pubKey;m.privKeyWrapped=privKeyWrapped;m.keyCreatedAt=keyCreatedAt}

// ── 중계 서버 연동 (스펙 §3.3 승인, 2차) — server/PROTOCOL.md 와 일치 ──
function relayBase(){return str(state.data.meta.relayServer).replace(/\/$/,'')}
async function decryptBlob(blob){const priv=await getPrivateKey();if(!priv)throw new Error('개인키 없음');const raw=await crypto.subtle.decrypt({name:'RSA-OAEP'},priv,b64ToBuf(blob.encKey));const aesKey=await crypto.subtle.importKey('raw',raw,{name:'AES-GCM'},false,['decrypt']);const pt=await crypto.subtle.decrypt({name:'AES-GCM',iv:new Uint8Array(b64ToBuf(blob.iv))},aesKey,b64ToBuf(blob.ct));return JSON.parse(new TextDecoder().decode(pt))}
async function batchHashOf(items){return hash(items.map(i=>i.name+'|'+i.dept+'|'+num(i.amount)).sort().join('\n'))}
async function relayRegister(){const base=relayBase(),rid=str(state.data.meta.restaurantId);if(!base){toast('서버 주소를 입력하세요.');return}if(!rid){toast('음식점 ID를 입력하세요.');return}if(!state.data.meta.pubKey){await ensureKeyPair()}setBusy('공개키를 등록하는 중입니다.');try{const r=await fetch(base+'/api/register-key',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({restaurant_id:rid,restaurant_name:state.data.meta.shopName||'',public_key:state.data.meta.pubKey})});const j=await r.json();clearBusy();if(!r.ok)throw new Error(j.error||'등록 실패');toast('공개키를 서버에 등록했습니다.')}catch(e){console.error(e);clearBusy();toast('등록 오류: '+(e.message||''))}}

async function relayApprove(sid){const base=relayBase();if(!base)return;const item=(state.modal&&state.modal.items||[]).find(x=>x.summary_id===sid);if(!item)return;if(!item.ciphertext){toast('암호문이 없습니다.');return}if(!window.confirm(`${item.summary.restaurant_name||''} · ${item.summary.department}\n총액 ${money(item.summary.total_amount)} · ${item.summary.member_count}명\n\n통장 입금을 확인하셨으면 승인하세요.`))return;setBusy('복호화·등록 중입니다.');try{const plain=await decryptBlob(item.ciphertext);if(!plain||!Array.isArray(plain.items))throw new Error('명단 형식 오류');const reHash=await batchHashOf(plain.items);if(reHash!==item.summary.batch_hash){clearBusy();if(!window.confirm('⚠️ batch_hash 불일치 — 전송 중 변조 가능성이 있습니다.\n그래도 등록하시겠습니까?'))return;setBusy('등록 중입니다.')}assignDuplicateSuffix(plain.items);const t=now(),ym=str(item.summary.year_month);let tip=chainTip();const emps=[],txs=[];for(const it of plain.items){const eid=uid();emps.push({id:eid,dept:str(it.dept),name:str(it.name),note:'',isDeleted:false,phone:'',phoneConsent:false,yearMonth:ym,createdAt:t,updatedAt:t});const amt=num(it.amount);if(amt>0){const tx=await makeTx({employeeId:eid,type:'open',amount:amt,beforeBalance:0,afterBalance:amt,reason:'기관 신청 승인',note:str(item.summary.institution)+' '+str(item.summary.department),createdAt:t+Math.random()},tip);tip=tx.txHash;txs.push(tx)}}await repo.apply({employees:emps,transactions:txs});emps.forEach(upsertEmp);txs.forEach(upsertTx);await fetch(base+'/api/approve',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({summary_id:sid,status:'APPROVED'})});state.modal.items=state.modal.items.filter(x=>x.summary_id!==sid);clearBusy();render();toast(`${emps.length}명을 등록했습니다.`)}catch(e){console.error(e);clearBusy();toast('승인 오류: '+(e.message||''))}}

// ── PIN 잠금 화면 ──
function pinScreenHtml(){
const hasPin=!!state.data.meta.pinHash;
const isSetup=!hasPin||state.pinMode==='change';
const step=isSetup?(state.pinSetup1?'confirm':'new'):'unlock';
const titles={new:'비밀번호 설정',confirm:'비밀번호 확인',unlock:'비밀번호 입력'};
const subs={new:'숫자 4자리를 입력하세요',confirm:'한번 더 입력하세요',unlock:'비밀번호를 입력하세요'};
const dots=[0,1,2,3].map(i=>`<div class="pin-dot${i<state.pinInput.length?' filled':''}${state.pinMsg&&state.pinMsg.includes('틀렸습니다')?' error':''}"></div>`).join('');
const keys=[1,2,3,4,5,6,7,8,9].map(n=>`<button class="pin-key" data-a="pin-key" data-key="${n}">${n}</button>`).join('');
const resetBtn=state.pinFails>=5?`<div class="pin-reset"><div style="color:var(--danger);font-size:13px;margin-bottom:8px">5회 이상 실패했습니다</div><button data-a="pin-reset">앱 초기화</button><div style="font-size:11px;color:var(--muted);margin-top:6px">PIN만 삭제할 수 없습니다.<br>초기화하면 모든 데이터가 삭제됩니다.</div></div>`:'';
return `<div class="pin-screen"><div class="pin-icon"><svg viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg></div><div class="pin-title">${titles[step]}</div><div class="pin-sub">${subs[step]}</div><div class="pin-dots">${dots}</div><div class="pin-pad">${keys}<button class="pin-key fn" data-a="pin-key" data-key="back">←</button><button class="pin-key" data-a="pin-key" data-key="0">0</button><button class="pin-key fn" data-a="pin-key" data-key="clear">C</button></div><div class="pin-msg">${esc(state.pinMsg)}</div>${resetBtn}</div>`}

async function handlePinKey(key){
if(key==='clear'){state.pinInput='';state.pinMsg='';render();return}
if(key==='back'){state.pinInput=state.pinInput.slice(0,-1);state.pinMsg='';render();return}
if(state.pinInput.length>=4)return;
state.pinInput+=key;state.pinMsg='';render();
if(state.pinInput.length<4)return;
const pin=state.pinInput;const hasPin=!!state.data.meta.pinHash;
const isSetup=!hasPin||state.pinMode==='change';
if(isSetup){
if(!state.pinSetup1){state.pinSetup1=pin;state.pinInput='';render();return}
if(state.pinSetup1!==pin){state.pinSetup1='';state.pinInput='';state.pinMsg='비밀번호가 일치하지 않습니다. 다시 설정하세요.';render();return}
const h=await hash(pin);state.data.meta.pinHash=h;await repo.apply({meta:{pinHash:h}});
state.pinInput='';state.pinSetup1='';state.pinMode='';state.pinLocked=false;state.pinFails=0;state.pinMsg='';render();toast('비밀번호가 설정되었습니다.')
}else{
const h=await hash(pin);
if(h===state.data.meta.pinHash){state.pinInput='';state.pinLocked=false;state.pinFails=0;state.pinMsg='';render()}
else{state.pinFails++;state.pinInput='';state.pinMsg=`비밀번호가 틀렸습니다. (${state.pinFails}회)`;render()}}}

async function pinReset(){const typed=window.prompt('PIN을 잊은 경우 보안을 위해 PIN만 초기화할 수 없습니다.\n\n앱을 초기화하면 직원, 거래, 서명, 백업 기록, PIN이 모두 삭제됩니다.\n계속하려면 "초기화"를 입력하세요.','');
if(typed===null)return;if(str(typed)!=='초기화'){toast('초기화 문구가 일치하지 않습니다.');return}
setBusy('앱을 초기화하는 중입니다.');try{await wipeLocalData();clearBusy();render();window.alert('초기화 완료\n\n모든 로컬 데이터가 삭제되었습니다. 새로 설정해 주세요.')}catch(err){console.error(err);clearBusy();toast('초기화 중 오류가 발생했습니다.')}}

// 음성 인식(STT) — 어르신·바쁜 매장을 위한 이름 음성 검색 (Web Speech API)
function voiceSearch(){
var SR=window.SpeechRecognition||window.webkitSpeechRecognition;
if(!SR){toast('이 브라우저는 음성 인식을 지원하지 않습니다.');return}
try{var rec=new SR();rec.lang='ko-KR';rec.interimResults=false;rec.maxAlternatives=1;toast('🎤 듣고 있어요… 이름을 말씀하세요');
rec.onresult=function(ev){var t=((ev.results[0]&&ev.results[0][0]&&ev.results[0][0].transcript)||'').replace(/\s+/g,'').replace(/[.,!?]+$/,'');if(!t){toast('다시 말씀해 주세요.');return}
state.search=t;state.deptFilter='';state.screen='home';render();toast('"'+t+'" 음성 검색')};
rec.onerror=function(ev){toast('음성 인식 오류'+(ev&&ev.error?': '+ev.error:''))};
rec.start()}catch(e){console.error(e);toast('음성 인식을 시작할 수 없습니다.')}}

const fa=document.activeElement,fid=fa&&fa.id,ss=fa&&fa.selectionStart,se=fa&&fa.selectionEnd;
const d=derive();qs('app').innerHTML=`<div class="app">${topBar()}<div class="stack">${banners()}${screenHtml(d)}</div>${navHtml()}</div>${modalHtml(d)}${state.toast?`<div class="toast">${esc(state.toast)}</div>`:''}${state.busy?`<div class="busy"><div>${esc(state.busy)}</div></div>`:''}`;

// ── 파생 데이터 ──
function derive(){const balances=new Map(),voided=new Set();const asc=[...state.data.transactions].sort((a,b)=>a.createdAt-b.createdAt||a.id.localeCompare(b.id));asc.forEach(t=>{const p=balances.get(t.employeeId)||0;balances.set(t.employeeId,applyTx(p,t));if(t.type==='void'&&t.targetTransactionId)voided.add(t.targetTransactionId)});const employees=state.data.employees.map(e=>({...e,balance:balances.get(e.id)||0,deptKey:e.dept||'부서 없음'})).sort((a,b)=>a.deptKey.localeCompare(b.deptKey,'ko')||a.name.localeCompare(b.name,'ko'));const empMap=new Map(employees.map(e=>[e.id,e]));const active=employees.filter(e=>!e.isDeleted);const kw=state.search.trim();const df=state.deptFilter;const filtered=active.filter(e=>{if(df&&e.deptKey!==df)return false;if(kw&&!e.name.includes(kw))return false;return true});const total=active.reduce((s,e)=>s+e.balance,0);const homeGroups=groupBy(filtered,e=>e.deptKey).map(([dept,items])=>({dept,items,count:items.length,totalBalance:items.reduce((s,e)=>s+e.balance,0)})).sort((a,b)=>a.dept.localeCompare(b.dept,'ko'));const hist=[...state.data.transactions].sort((a,b)=>b.createdAt-a.createdAt||b.id.localeCompare(a.id)).filter(t=>!state.historyEmployeeId||t.employeeId===state.historyEmployeeId);const historyGroups=groupBy(hist,t=>{const e=empMap.get(t.employeeId);return(e?e.deptKey:'부서 없음')+'||'+(e?e.name:'알 수 없는 직원')+'||'+t.employeeId}).map(([key,items])=>{const[dept,name,eid]=key.split('||');return{dept,name,employeeId:eid,employee:empMap.get(eid)||null,items}}).sort((a,b)=>a.dept.localeCompare(b.dept,'ko')||a.name.localeCompare(b.name,'ko'));const dateHist=[...state.data.transactions].sort((a,b)=>b.createdAt-a.createdAt||b.id.localeCompare(a.id));const dateKey=ts=>{const x=new Date(ts);return `${x.getFullYear()}.${String(x.getMonth()+1).padStart(2,'0')}.${String(x.getDate()).padStart(2,'0')}`};const dateGroups=groupBy(dateHist,t=>dateKey(t.createdAt)).map(([date,items])=>{const useTotal=items.filter(t=>t.type==='use'&&!voided.has(t.id)).reduce((s,t)=>s+num(t.amount),0);return{date,items,useTotal,count:items.length}});return{employees,empMap,active,filtered,total,homeGroups,voided,historyGroups,dateGroups}}

// ── 화면 HTML ──
function topBar(){const sub={home:'차감과 잔액을 빠르게 처리합니다.',history:'거래와 취소 기록을 확인합니다.',settings:'직원 관리와 백업을 처리합니다.'}[state.screen]||'';const homeBtn=state.screen==='home'?`<button class="btn" data-a="reset-filter">검색 초기화</button>`:`<button class="btn" data-a="go-home">홈</button>`;const btns=state.screen==='history'?'<button class="btn-primary" data-a="export">백업</button>':'';let filters='';if(state.screen==='home'){const activeDepts=[...new Set(state.data.employees.filter(e=>!e.isDeleted).map(e=>e.dept||'부서 없음'))].sort((a,b)=>a.localeCompare(b,'ko'));const deptOpts=['<option value="">전체 부서</option>',...activeDepts.map(d=>`<option value="${esc(d)}"${state.deptFilter===d?' selected':''}>${esc(d)}</option>`)].join('');filters=`<div style="display:flex;gap:8px"><select id="deptFilterSelect" style="flex:1">${deptOpts}</select><input id="searchInput" type="text" placeholder="직원명 검색" value="${esc(state.search)}" style="flex:1"><button class="btn" data-a="voice-search" title="음성으로 이름 검색" aria-label="음성 검색" style="flex:0 0 auto;min-width:52px;font-size:20px">🎤</button></div>`}else if(state.screen==='history'){filters=historyFilterHtml()}const shop=state.data.meta.shopName;const shopAddr=state.data.meta.shopAddr||'';const shopHtml=shop&&state.screen==='home'?`<div style="font-size:26px;font-weight:800;letter-spacing:-.5px;background:linear-gradient(135deg,#1a5276,#2e86c1);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:4px">${esc(shop)}${shopAddr?` <span style="font-size:13px;font-weight:600;letter-spacing:0">(${esc(shopAddr)})</span>`:''}</div>`:'';return `<div class="top">${shopHtml}<div class="title"><div><h1>${APP}</h1><div class="sub">${sub}</div></div><div class="tool">${homeBtn}${btns}</div></div>${filters}</div>`}
function historyFilterHtml(){const d=derive();const tabStyle='flex:1;min-height:38px;border-radius:10px;font-size:13px;font-weight:700;';const dateOn=state.historyTab==='date';const empOn=state.historyTab==='employee';const empFilter=empOn?`<select id="historyFilter" style="margin-top:8px">${['<option value="">전체 직원</option>',...d.employees.map(e=>`<option value="${esc(e.id)}"${state.historyEmployeeId===e.id?' selected':''}>${esc(e.name)} (${esc(e.dept||'부서 없음')})${e.isDeleted?' [숨김]':''}</option>`)].join('')}</select>`:'';return `<div style="display:flex;gap:8px"><button style="${tabStyle}${dateOn?'background:var(--primary);color:#fff;border:none':'background:#fff;color:var(--muted);border:1.5px solid var(--line)'}" data-a="history-tab" data-tab="date">일자별</button><button style="${tabStyle}${empOn?'background:var(--primary);color:#fff;border:none':'background:#fff;color:var(--muted);border:1.5px solid var(--line)'}" data-a="history-tab" data-tab="employee">직원별</button></div>${empFilter}`}
function banners(){let h='';if(state.mode!=='IndexedDB')h+='<div class="card banner error"><strong>호환 모드 저장</strong><div class="meta">IndexedDB를 사용할 수 없어 localStorage에 저장합니다.</div></div>';if(backupDue())h+=`<div class="card banner warn"><strong>매일 영업 종료 후 장부 안전 저장</strong><div class="meta">${state.data.meta.lastBackupAt?`마지막 백업: ${dt(state.data.meta.lastBackupAt)}`:'아직 백업이 없습니다.'}<br>Chrome 사이트 데이터, 캐시, 저장공간을 삭제하면 앱 데이터가 사라질 수 있습니다.</div></div>`;return h}
function screenHtml(d){if(state.screen==='history')return historyHtml(d);if(state.screen==='settings')return settingsHtml(d);return homeHtml(d)}
function homeHtml(d){if(!d.filtered.length)return `<div class="card empty">${(state.search.trim()||state.deptFilter)?'검색 결과가 없습니다.<br><button class="btn" data-a="reset-filter" style="margin-top:12px">초기화</button>':'등록된 직원이 없습니다.<br>하단 [설정] 탭에서 직원을 등록하세요.'}</div>`;return `${d.homeGroups.map(g=>`<div class="card group"><div class="group-head"><div><div class="group-title">${esc(g.dept)}</div><div class="group-meta">직원 ${g.count}명</div></div><div class="bal ${g.totalBalance<0?'negative':g.totalBalance===0?'zero':''}">${money(g.totalBalance)}</div></div>${g.items.map(empCard).join('')}</div>`).join('')}<div class="card summary"><div>활성 직원 ${d.active.length}명</div><div class="v">총 잔액 ${money(d.total)}</div></div>`}
function empCard(e){const c=e.balance<0?'negative':e.balance===0?'zero':'';return `<div class="card employee" style="display:flex;align-items:center;gap:12px"><div class="employee-main" data-a="history-for" data-id="${esc(e.id)}" style="flex:1;min-width:0"><div class="name">${esc(e.name)}</div><div class="dept">${esc(e.dept||'부서 없음')}${e.note?' · '+esc(e.note):''}</div></div><div class="bal ${c}" style="margin:0;white-space:nowrap">${money(e.balance)}</div><button class="btn-primary" data-a="use" data-id="${esc(e.id)}" style="min-width:auto;padding:10px 18px">사용</button></div>`}
function historyHtml(d){if(state.historyTab==='employee')return historyByEmployee(d);return historyByDate(d)}
function historyByDate(d){if(!d.dateGroups.length)return '<div class="card empty">거래 이력이 없습니다.</div>';return d.dateGroups.map(g=>`<div class="card"><div style="display:flex;justify-content:space-between;align-items:center;gap:8px;padding-bottom:8px;border-bottom:1.5px solid #eef1f4"><div class="name" style="font-size:16px">${esc(g.date)}</div><div style="font-size:12px;color:var(--muted)">${g.count}건${g.useTotal?` · 사용 ${money(g.useTotal)}`:''}</div></div><div class="list">${g.items.map(t=>txCardDate(t,d)).join('')}</div></div>`).join('')}
function txCardDate(t,d){const e=d.empMap.get(t.employeeId);const eName=e?e.name:'알 수 없음';const eDept=e?e.deptKey:'';const lbl={open:'등록',topup:'충전',use:'사용',void:'취소',adjust:'조정'}[t.type]||t.type;const isOut=t.type==='use';const isAdj=t.type==='adjust';const isV=d.voided.has(t.id);const adjNeg=isAdj&&num(t.amount)<0;const sign=isOut?'-':adjNeg?'':'+';const cls=isOut?'out':isAdj?'adjust':'in';const sig=t.signatureData?`<img class="thumb" src="${t.signatureData}" data-a="view-sign" data-id="${esc(t.id)}" alt="서명">`:'';const vb=t.type==='use'&&!isV?`<button class="small" data-a="void" data-id="${esc(t.id)}">취소</button>`:'';const vm=isV?'<span class="chip" style="background:var(--danger-soft);color:var(--danger)">취소됨</span>':'';const nt=t.note?`<span class="chip">${esc(t.note)}</span>`:'';const time=new Date(t.createdAt);const hm=String(time.getHours()).padStart(2,'0')+':'+String(time.getMinutes()).padStart(2,'0');return `<div class="txn" style="${isV?'opacity:.5':''}"><div class="txn-top"><div><div class="txn-title">${esc(eName)} <span style="font-weight:400;color:var(--muted);font-size:11px">${esc(eDept)} · ${esc(lbl)}</span></div></div><div class="amt ${cls}">${sign}${money(isAdj?t.amount:Math.abs(t.amount))}</div></div><div class="chips"><span>${hm}</span>${nt}${vm}${t.reason&&t.type!=='use'?`<span>${esc(t.reason)}</span>`:''}</div>${sig}${vb}</div>`}
function historyByEmployee(d){if(!d.historyGroups.length)return '<div class="card empty">거래 이력이 없습니다.</div>';return d.historyGroups.map(g=>{const emp=g.employee;const bal=emp?emp.balance:0;const canAdjust=emp&&!emp.isDeleted;return `<div class="card"><div style="display:flex;justify-content:space-between;align-items:center;gap:8px"><div class="name">${esc(g.name)}<span class="dept" style="margin-left:8px">${esc(g.dept)}</span></div><div style="display:flex;align-items:center;gap:8px"><div style="font-size:22px;font-weight:800;color:var(--danger);white-space:nowrap">잔액 ${money(bal)}</div>${canAdjust?`<button class="small" data-a="adjust" data-id="${esc(g.employeeId)}">조정</button>`:''}</div></div><div class="list">${g.items.map(t=>txCard(t,d)).join('')}</div></div>`}).join('')}
function txCard(t,d){const lbl={open:'등록',topup:'충전',use:'사용',void:'취소',adjust:'조정'}[t.type]||t.type;const isOut=t.type==='use';const isAdj=t.type==='adjust';const isV=d.voided.has(t.id);const adjNeg=isAdj&&num(t.amount)<0;const sign=isOut?'-':adjNeg?'':'+';const cls=isOut?'out':isAdj?'adjust':'in';const displayAmt=isAdj?money(t.amount):money(Math.abs(t.amount));const sig=t.signatureData?`<img class="thumb" src="${t.signatureData}" data-a="view-sign" data-id="${esc(t.id)}" alt="서명">`:'';const vb=t.type==='use'&&!isV?`<button class="small" data-a="void" data-id="${esc(t.id)}">취소</button>`:'';const vm=isV?'<span class="chip" style="background:var(--danger-soft);color:var(--danger)">취소됨</span>':'';const nt=t.note?`<span class="chip">${esc(t.note)}</span>`:'';return `<div class="txn" style="${isV?'opacity:.5':''}"><div class="txn-top"><div class="txn-title">${esc(lbl)}</div><div class="amt ${cls}">${sign}${displayAmt}</div></div><div class="chips"><span style="font-size:14px;font-weight:600">${dt(t.createdAt)}</span>${nt}${vm}${t.reason&&t.type!=='use'?`<span>${esc(t.reason)}</span>`:''}</div>${sig}${vb}</div>`}
function manageRow(e){return `<div class="row"><div class="left"><div class="txn-title">${esc(e.name)}${e.isDeleted?'<span class="hidden-badge">숨김</span>':''}</div><div class="meta">${esc(e.dept||'부서 없음')} · 현재 잔액 ${money(e.balance)}</div>${e.note?`<div class="meta">${esc(e.note)}</div>`:''}</div><div class="right">${e.isDeleted?`<button class="small" data-a="restore-emp" data-id="${esc(e.id)}">복원</button>`:`<button class="small" data-a="edit-employee" data-id="${esc(e.id)}">수정</button><button class="small" data-a="topup" data-id="${esc(e.id)}">충전</button><button class="small" data-a="adjust" data-id="${esc(e.id)}">조정</button><button class="small" data-a="hide" data-id="${esc(e.id)}">숨김</button>`}</div></div>`}
function navHtml(){return `<div class="nav"><button class="${state.screen==='home'?'active':''}" data-a="screen" data-screen="home"><svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>홈</button><button class="${state.screen==='history'?'active':''}" data-a="screen" data-screen="history"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>이력</button><button class="${state.screen==='settings'?'active':''}" data-a="screen" data-screen="settings"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 1 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 1 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 1 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 1 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>설정</button></div>`}

if(state.modal.type==='usage'){const e=d.empMap.get(state.modal.id);if(!e)return '';return `<div class="modal-back"><div class="modal"><h2>사용 등록</h2><p class="help">금액을 입력한 뒤 서명을 받고 저장하세요.</p><div class="receipt"><div class="receipt-row"><span>직원</span><strong>${esc(e.name)}</strong></div><div class="receipt-row"><span>부서</span><strong>${esc(e.dept||'부서 없음')}</strong></div><div class="receipt-row"><span>현재 잔액</span><strong style="font-size:24px;color:var(--primary)">${money(e.balance)}</strong></div></div><div class="form">${field('useAmount','사용 금액','','금액을 입력하세요','number')}${field('useNote','비고 (점심/저녁/특식 등)','','선택 입력')}${state.data.meta.smsEnabled?(e.phoneConsent&&e.phone?`<div class="field"><label>문자 안내</label><div class="meta">번호가 등록되어 있어 저장 후 문자앱이 열립니다.</div></div>`:`<div class="field"><label>문자 안내 (선택)</label><div class="meta" style="font-size:11px;line-height:1.5;margin-bottom:6px">선금 잔액 안내 문자 발송 목적으로 휴대전화번호를 수집합니다. 목적 외 사용하지 않으며 정산 종료 후 파기합니다.</div><label class="dept-check"><input type="checkbox" id="usePhoneConsent"> 직원이 번호 제공에 동의함</label><input id="usePhone" type="tel" inputmode="numeric" placeholder="휴대전화번호 (예: 01012345678)" style="margin-top:6px"></div>`):''}<div class="field"><label>서명</label><div class="sig-box"><canvas id="signCanvas" class="signature"></canvas></div></div></div><div class="modal-actions"><button class="btn" data-a="clear-sign">서명 지우기</button><button class="btn" data-a="close-modal">취소</button><button class="btn-primary" data-a="save-use">서명 후 저장</button></div></div></div>`}
if(state.modal.type==='signature'){const t=state.data.transactions.find(v=>v.id===state.modal.id);if(!t||!t.signatureData)return '';const e=state.data.employees.find(v=>v.id===t.employeeId);return `<div class="modal-back"><div class="modal" style="text-align:center"><h2>서명 확인</h2><p class="help">${esc(e?e.name:'알 수 없음')} · ${dt(t.createdAt)} · ${money(t.amount)}</p><img src="${t.signatureData}" style="max-width:100%;border:1px solid var(--line);border-radius:12px;background:#fff" alt="서명"><div class="modal-actions"><button class="btn" data-a="close-modal">닫기</button></div></div></div>`}
if(state.modal.type==='inbox'){const items=state.modal.items||[];const body=items.length?items.map(it=>`<div style="border:1px solid var(--line);border-radius:10px;padding:10px;margin-bottom:8px"><div style="font-weight:700">${esc(it.summary.restaurant_name||'')} · ${esc(it.summary.department)}</div><div class="meta">${esc(it.summary.institution||'')} · ${esc(it.summary.year_month||'')}</div><div style="margin:6px 0">총액 <b>${money(it.summary.total_amount)}</b> · ${num(it.summary.member_count)}명 <span class="meta">(승인 전에는 이름이 보이지 않습니다)</span></div><div style="display:flex;gap:8px"><button class="btn-primary" data-a="relay-approve" data-sid="${esc(it.summary_id)}">통장 확인 후 승인</button><button class="btn-danger" data-a="relay-reject" data-sid="${esc(it.summary_id)}">거절</button></div></div>`).join(''):'<div class="empty">대기 중인 신청이 없습니다.</div>';return `<div class="modal-back"><div class="modal"><h2>기관 신청 수신함</h2><p class="help">통장에서 입금자명·금액을 대조한 뒤 승인하세요. 승인 시에만 명단이 복호화됩니다.</p>${body}<div class="modal-actions"><button class="btn" data-a="relay-inbox">새로고침</button><button class="btn" data-a="close-modal">닫기</button></div></div></div>`}
if(state.modal.type==='csv'){const rows=state.modal.rows||[];const dupWarn=state.modal.dupWarn||0;const errs=rows.filter(r=>r.error).length;const newCount=rows.filter(r=>!r.error&&r.mode!=='topup').length;const topupCount=rows.filter(r=>!r.error&&r.mode==='topup').length;const sm=!rows.length?'':errs>0?`<div style="color:var(--danger);font-weight:700;margin:8px 0">❌ ${errs}건 오류 — 수정 후 다시 시도하세요</div>`:`<div style="color:var(--success);font-weight:700;margin:8px 0">✅ ${newCount?'신규 '+newCount+'명':''}${newCount&&topupCount?' + ':''}${topupCount?'기존 충전 '+topupCount+'명':''} — 임포트 가능</div>`;const tb=rows.length?`<div class="csv-preview"><table class="csv-table"><thead><tr><th>행</th><th>부서</th><th>이름</th><th>금액</th><th>상태</th></tr></thead><tbody>${rows.map(r=>`<tr class="${r.error?'err':''}" style="${r.mode==='topup'?'background:var(--warn-soft)':''}"><td>${r.line}</td><td>${esc(r.dept)}</td><td>${esc(r.name)}</td><td>${r.amount?money(r.amount):'-'}</td><td>${r.error||(r.mode==='topup'?'🔄 추가 충전':'✅ 신규')}</td></tr>`).join('')}</tbody></table></div>`:'';return `<div class="modal-back"><div class="modal"><h2>CSV 파일 불러오기</h2><p class="help">UTF-8 CSV 파일. 필수 컬럼: 부서, 이름, 금액 (헤더 행 필수)<br>이미 등록된 직원은 금액이 추가 충전됩니다.</p>${sm}${dupWarn?`<div style="color:var(--warn,#b7791f);font-weight:700;margin:8px 0">⚠️ 동명이인 ${dupWarn}건 감지 — a/b/c 접미사를 자동 부여했습니다. 표에서 확인하세요.</div>`:''}${tb}<div class="modal-actions"><button class="btn" data-a="close-modal">취소</button>${rows.length&&!errs?'<button class="btn-primary" data-a="exec-csv">임포트 실행</button>':'<button class="btn-secondary" data-a="pick-csv">파일 선택</button>'}</div></div></div>`}
return ''}

// ── 이벤트 ──
async function onClick(e){const el=e.target.closest('[data-a]');if(!el)return;const a=el.dataset.a;
if(a==='go-home'){state.screen='home';state.search='';state.deptFilter='';render()}
else if(a==='reset-filter'){state.search='';state.deptFilter='';render()}
else if(a==='screen'){state.screen=el.dataset.screen||'home';if(state.screen!=='history')state.historyEmployeeId='';render()}
else if(a==='add-employee'){state.modal={type:'employee',mode:'add'};render()}
else if(a==='edit-employee'){state.modal={type:'employee',mode:'edit',id:el.dataset.id};render()}
else if(a==='topup'){state.modal={type:'topup',id:el.dataset.id};render()}
else if(a==='adjust'){state.modal={type:'adjust',id:el.dataset.id};render()}
else if(a==='use'){state.modal={type:'usage',id:el.dataset.id};render()}
else if(a==='history-for'){state.historyEmployeeId=el.dataset.id||'';state.historyTab='employee';state.screen='history';render()}
else if(a==='history-tab'){state.historyTab=el.dataset.tab||'date';if(state.historyTab==='date')state.historyEmployeeId='';render()}
else if(a==='view-sign'){state.modal={type:'signature',id:el.dataset.id};render()}
else if(a==='close-modal'){state.modal=null;render()}
else if(a==='fill-use'){const i=qs('useAmount');if(i)i.value=el.dataset.amount||''}
else if(a==='fill-open'){const i=qs('empOpen');if(i)i.value=el.dataset.amount||''}
else if(a==='pick-dept'){const input=qs('empDept');if(input){input.value=el.dataset.dept||'';input.focus()}document.querySelectorAll('.dept-pick').forEach(c=>c.classList.toggle('on',c.dataset.dept===el.dataset.dept))}
else if(a==='clear-sign'){if(signPad)signPad.clear()}
else if(a==='save-employee'){await saveEmployee()}
else if(a==='save-topup'){await saveTopup()}
else if(a==='save-adjust'){await saveAdjust()}
else if(a==='save-use'){await saveUse()}
else if(a==='hide'){await hideEmployee(el.dataset.id)}
else if(a==='restore-emp'){await restoreEmployee(el.dataset.id)}
else if(a==='void'){await voidUsage(el.dataset.id)}
else if(a==='export'){await exportBackup()}
else if(a==='export-safe'){await exportSafeLedger()}
else if(a==='import'){qs('restoreFile').value='';qs('restoreFile').click()}
else if(a==='verify-integrity'){await runIntegrityCheck()}
else if(a==='toggle-sms'){const on=!state.data.meta.smsEnabled;state.data.meta.smsEnabled=on;await repo.apply({meta:{smsEnabled:on}});render();toast(on?'문자 안내를 켰습니다.':'문자 안내를 껐습니다.')}
else if(a==='purge-phones'){await purgePhones()}
else if(a==='export-key'){await exportKeyBackup()}
else if(a==='show-pubkey'){const pk=state.data.meta.pubKey;if(!pk){toast('등록된 공개키가 없습니다.');return}window.prompt('이 음식점의 공개키 (담당자/서버 등록용). 복사해서 사용하세요.',pk)}
else if(a==='relay-save'){const s=str(qs('relayServer')&&qs('relayServer').value),rid=str(qs('relayRestId')&&qs('relayRestId').value);state.data.meta.relayServer=s;state.data.meta.restaurantId=rid;await repo.apply({meta:{relayServer:s,restaurantId:rid}});render();toast('서버 설정을 저장했습니다.')}
else if(a==='relay-register'){await relayRegister()}
else if(a==='relay-inbox'){await relayOpenInbox()}
else if(a==='relay-approve'){await relayApprove(el.dataset.sid)}
else if(a==='relay-reject'){await relayReject(el.dataset.sid)}
else if(a==='csv-import'){state.modal={type:'csv',rows:[]};render()}
else if(a==='pick-csv'){qs('csvFile').value='';qs('csvFile').click()}
else if(a==='exec-csv'){await executeCsvImport()}
else if(a==='edit-org'){await editOrgName()}
else if(a==='save-shop'){await saveShopName()}
else if(a==='add-dept'){await addDept()}
else if(a==='remove-dept'){await removeDept(Number(el.dataset.idx))}
else if(a==='toggle-dept'){const dept=el.dataset.dept;state.expandedDepts[dept]=!state.expandedDepts[dept];render()}
else if(a==='pin-key'){await handlePinKey(el.dataset.key)}
else if(a==='pin-reset'){await pinReset()}
else if(a==='change-pin'){state.pinMode='change';state.pinLocked=true;state.pinInput='';state.pinSetup1='';state.pinMsg='';state.pinFails=0;render()}
else if(a==='voice-search'){voiceSearch()}
else if(a==='setup-next'){if(state.setupSelected){state.data.meta.shopName=state.setupSelected.name;state.data.meta.shopAddr=state.setupSelected.addr;state.data.meta.shopTel=state.setupSelected.tel;state.setupDepts=[].concat(COMMON_DEPTS);state.setupStep=2;render()}}
else if(a==='setup-manual-save'){var mn=str(qs('setupManualName')&&qs('setupManualName').value);var ma=str(qs('setupManualAddr')&&qs('setupManualAddr').value);var mt=str(qs('setupManualTel')&&qs('setupManualTel').value);if(!mn){toast('음식점 이름을 입력하세요.');return}state.setupSelected={idx:-1,name:mn,addr:ma,tel:mt,type:'직접입력'};render()}
else if(a==='setup-skip'){state.setupDepts=[].concat(COMMON_DEPTS);state.setupStep=2;render()}

function backupCore(){return{schemaVersion:3,appName:APP,appVersion:APP_VERSION,exportedAt:now(),payload:{employees:state.data.employees,transactions:state.data.transactions,meta:{...state.data.meta}}}}
function backupSummary(data){return{employeeCount:data.employees.filter(v=>!v.isDeleted).length,totalEmployeeCount:data.employees.length,transactionCount:data.transactions.length}}
async function buildBackupPayload(){const core=backupCore();const checksum=await hash(JSON.stringify(core));return{...core,summary:backupSummary(core.payload),checksum}}
function parseBackupPayload(parsed){if(!parsed||typeof parsed!=='object')throw new Error('형식 오류');if((parsed.schemaVersion===2||parsed.schemaVersion===3)&&parsed.payload&&Array.isArray(parsed.payload.employees)&&Array.isArray(parsed.payload.transactions)){const core={schemaVersion:parsed.schemaVersion,appName:parsed.appName,appVersion:parsed.appVersion,exportedAt:parsed.exportedAt,payload:parsed.payload};return{version:parsed.schemaVersion,checksum:parsed.checksum||'',core,data:parsed.payload}}if(Array.isArray(parsed.employees)&&Array.isArray(parsed.transactions)){const core={version:parsed.version,appName:parsed.appName,appVersion:parsed.appVersion,exportedAt:parsed.exportedAt,employees:parsed.employees,transactions:parsed.transactions,meta:parsed.meta||{}};return{version:1,checksum:parsed.checksum||'',core,data:{employees:parsed.employees,transactions:parsed.transactions,meta:parsed.meta||{}}}}throw new Error('지원하지 않는 백업 형식')}
function validateRestoreData(data){const errors=[],warnings=[],empIds=new Set(),txIds=new Set(),allowed=new Set(['open','topup','use','void','adjust']);data.employees.forEach((e,i)=>{if(!e.id)errors.push(`직원 ${i+1}: ID 없음`);if(!e.name)errors.push(`직원 ${i+1}: 이름 없음`);if(empIds.has(e.id))errors.push(`직원 ID 중복: ${e.id}`);empIds.add(e.id)});data.transactions.forEach((t,i)=>{if(!t.id)errors.push(`거래 ${i+1}: ID 없음`);if(txIds.has(t.id))errors.push(`거래 ID 중복: ${t.id}`);txIds.add(t.id);if(!allowed.has(t.type))errors.push(`거래 ${i+1}: 알 수 없는 유형 ${t.type}`);if(!empIds.has(t.employeeId))errors.push(`거래 ${i+1}: 직원 참조 없음`);if(!Number.isInteger(num(t.amount)))errors.push(`거래 ${i+1}: 금액이 정수가 아님`);if(['open','topup','use','void'].includes(t.type)&&num(t.amount)<=0)errors.push(`거래 ${i+1}: 금액은 1원 이상이어야 함`);if(t.type==='adjust'&&num(t.amount)===0)warnings.push(`거래 ${i+1}: 조정 금액이 0원입니다.`)});data.transactions.forEach((t,i)=>{if(t.type==='void'&&t.targetTransactionId&&!txIds.has(t.targetTransactionId))errors.push(`거래 ${i+1}: 취소 대상 거래가 없습니다.`)});const balances=new Map();[...data.transactions].sort((a,b)=>a.createdAt-b.createdAt||a.id.localeCompare(b.id)).forEach((t,i)=>{const before=balances.get(t.employeeId)||0,after=applyTx(before,t);if(num(t.beforeBalance)!==before||num(t.afterBalance)!==after)warnings.push(`거래 ${i+1}: 저장된 전후 잔액과 재계산 잔액이 다릅니다.`);balances.set(t.employeeId,after)});return{errors,warnings}}
async function markBackupSaved(){const lastBackupAt=now();await repo.apply({meta:{lastBackupAt}});state.data.meta.lastBackupAt=lastBackupAt;state.backupConfirmed=true;render()}
async function exportBackup(isFinal,opts){opts=opts||{};if(!opts.noBusy)setBusy('백업 파일을 만드는 중입니다.');try{const payload=await buildBackupPayload();const json=JSON.stringify(payload,null,2);const fn=backupFileName(isFinal);const usedBridge=downloadFile(json,fn,'application/json');if(!opts.noBusy)clearBusy();if(usedBridge){if(!opts.silent)toast('백업 파일을 저장하는 중입니다.');return{filename:fn,usedBridge}}if(opts.skipConfirm){await markBackupSaved();if(!opts.silent)toast('백업 파일 다운로드 시작됨');return{filename:fn,usedBridge:false}}const confirmed=window.confirm('백업 파일 다운로드가 시작되었습니다.\n\n파일이 실제로 저장된 것을 확인했습니까?');if(confirmed){await markBackupSaved();toast('백업 저장 확인됨')}else{toast('백업 파일 저장을 확인해 주세요.')}return{filename:fn,usedBridge:false}}catch(err){console.error(err);if(!opts.noBusy)clearBusy();toast('백업 생성 오류');if(isFinal||opts.throwOnError)throw err;return null}}

// ── 장부 내보내기 (CSV) ──
async function exportCsvLedger(opts){
opts=opts||{};
const d=derive();const org=state.data.meta.orgName||DEFAULT_ORG;
const today=new Date();const dateStr=`${today.getFullYear()}.${String(today.getMonth()+1).padStart(2,'0')}.${String(today.getDate()).padStart(2,'0')}`;
const csvQ=v=>{const s=String(v==null?'':v);return s.includes(',')||s.includes('"')||s.includes('\n')?'"'+s.replace(/"/g,'""')+'"':s};
const row=arr=>arr.map(csvQ).join(',')+'\r\n';
let csv='';
// ── 1. 요약 정보 ──
csv+=row([`${org} 선입금 장부`,'','',`출력일: ${dateStr}`]);
csv+=row([`활성 직원: ${d.active.length}명`,'',`총 잔액: ${money(d.total)}`,'']);
csv+=row([]);
// ── 2. 직원별 잔액 현황 ──
csv+=row(['【 직원별 잔액 현황 】','','','']);
csv+=row(['부서','직원명','잔액','메모']);
d.homeGroups.forEach(g=>{
g.items.forEach(e=>{csv+=row([e.dept,e.name,num(e.balance),e.note||''])});
csv+=row([`  ${g.dept} 소계`,'',num(g.totalBalance),'']);
});
csv+=row(['합계','',num(d.total),'']);
csv+=row([]);
// ── 3. 거래 내역 ──
csv+=row(['【 거래 내역 】','','','','','']);
csv+=row(['일시','부서','직원명','유형','금액','잔액(후)','비고/사유']);
const typeNames={open:'등록',topup:'충전',use:'사용',void:'취소',adjust:'조정'};
const allTx=[...state.data.transactions].sort((a,b)=>a.createdAt-b.createdAt);
allTx.forEach(t=>{
const e=state.data.employees.find(v=>v.id===t.employeeId);
const dept=e?e.dept:'';const name=e?e.name:'알 수 없음';
const typeName=typeNames[t.type]||t.type;
const sign=t.type==='use'?'-':(t.type==='adjust'&&num(t.amount)<0?'':'');
const memo=[t.note,t.reason].filter(Boolean).join(' / ');
const isVoided=state.data.transactions.some(v=>v.type==='void'&&v.targetTransactionId===t.id);
const displayAmount=t.type==='adjust'?num(t.amount):num(Math.abs(t.amount));
csv+=row([dt(t.createdAt),dept,name,typeName+(isVoided?' (취소됨)':''),sign+displayAmount,num(t.afterBalance),memo]);
});
csv+=row([]);
csv+=row([`총 거래 ${allTx.length}건`,'','','','','','']);
// BOM + UTF-8로 다운로드 (엑셀에서 한글 깨짐 방지)
const bom='\uFEFF';
const blob=new Blob([bom+csv],{type:'text/csv;charset=utf-8'});
const fn=`선입금장부_${org}_${today.getFullYear()}-${String(today.getMonth()+1).padStart(2,'0')}-${String(today.getDate()).padStart(2,'0')}.csv`;
downloadBlob(blob,fn);
if(!opts.silent)toast('장부 CSV 저장됨');
return fn;
}
function backupFileName(isFinal){const d=new Date();const ymd=`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;return isFinal?`선입금대장_최종백업_${ymd}.json`:`선입금대장_${ymd}.json`}
async function exportSafeLedger(){setBusy('장부와 백업 파일을 만드는 중입니다.');try{await exportCsvLedger({silent:true});await exportBackup(false,{silent:true,skipConfirm:true,noBusy:true,throwOnError:true});clearBusy();toast('장부 안전 저장 파일 2개를 만들었습니다.')}catch(err){console.error(err);clearBusy();toast('장부 안전 저장 오류')}}
function downloadBlob(blob,filename){const url=URL.createObjectURL(blob),a=document.createElement('a');a.href=url;a.download=filename;a.click();setTimeout(()=>URL.revokeObjectURL(url),1000)}
function downloadFile(content,filename,type){if(typeof AndroidBridge!=='undefined'&&AndroidBridge.saveBackup&&(!type||type.indexOf('json')>=0)){AndroidBridge.saveBackup(content,filename);return true}downloadBlob(new Blob([content],{type:type||'application/json'}),filename);return false}
window.onBackupSaved=async function(fn){const lastBackupAt=now();try{await repo.apply({meta:{lastBackupAt}});state.data.meta.lastBackupAt=lastBackupAt;state.backupConfirmed=true;render()}catch(e){console.error(e)}toast('백업 저장 완료: '+fn)};
async function restoreFromParsed(parsed){const parsedBackup=parseBackupPayload(parsed);const checksum=parsedBackup.checksum,calc=await hash(JSON.stringify(parsedBackup.core));const data=norm(parsedBackup.data);const validation=validateRestoreData(data);if(validation.errors.length){throw new Error('복원 검증 실패: '+validation.errors.join(', '))}

function parseCsvLine(line){const f=[];let c='',q=false;for(let i=0;i<line.length;i++){const ch=line[i];if(ch==='"'&&!q)q=true;else if(ch==='"'&&q){if(line[i+1]==='"'){c+='"';i++}else q=false}else if(ch===','&&!q){f.push(c);c=''}else c+=ch}f.push(c);return f.map(s=>s.trim())}

async function onCsvFile(e){const file=e.target.files&&e.target.files[0];if(!file)return;try{

if(text.charCodeAt(0)===0xFEFF)text=text.slice(1);
const allLines=text.split(/\r?\n/);const nonEmpty=allLines.filter(l=>l.trim());
if(nonEmpty.length<2){toast('데이터 없음');return}

// 메타데이터에서 부서명 추출 (예: "급량비(보건의료과)" 또는 "부서: 보건의료과")
let metaDept='';
for(let i=0;i<Math.min(nonEmpty.length,5);i++){const l=nonEmpty[i];
const m1=l.match(/부서\s*[:：]\s*(.+)/);if(m1){metaDept=m1[1].trim().replace(/,.*$/,'');break}
const m2=l.match(/[급량비비용]\(([^)]+)\)/);if(m2){metaDept=m2[1].trim();break}
const m3=l.match(/\(([가-힣]+[과동부국소])\)/);if(m3&&!metaDept){metaDept=m3[1].trim()}}

// 헤더 행 찾기 (첫 번째로 '이름|성명|직원' 컬럼이 있는 행)
let headerIdx=-1,headers=[];
for(let i=0;i<Math.min(nonEmpty.length,10);i++){const cols=parseCsvLine(nonEmpty[i]).map(h=>h.replace(/\s/g,''));
if(cols.some(h=>/이름|성명|직원명/.test(h))&&cols.some(h=>/금액|선입금|입금/.test(h))){headerIdx=i;headers=cols;break}}
if(headerIdx<0){toast('필수 컬럼(이름/직원명, 금액)을 찾을 수 없습니다.\n헤더 행이 있는지 확인하세요.');return}

// 컬럼 매핑 (부서 컬럼은 선택적)
const di=headers.findIndex(h=>/부서/.test(h));
const ni=headers.findIndex(h=>/이름|성명|직원명/.test(h));
const ai=headers.findIndex(h=>/금액|선입금|입금/.test(h));
if(ni<0||ai<0){toast('이름/금액 컬럼을 찾을 수 없습니다.');return}

// 부서 컬럼이 없으면 메타데이터에서 추출한 부서 사용
const hasDeptCol=di>=0;
if(!hasDeptCol&&!metaDept){
// 마지막 시도: 파일 전체에서 "부서:" 패턴 찾기
for(const l of nonEmpty){const m=l.match(/부서\s*[:：]\s*(.+)/);if(m){metaDept=m[1].trim().replace(/,.*$/,'');break}}}

// 데이터 행 파싱
const ex=new Set(state.data.employees.filter(v=>!v.isDeleted).map(v=>v.dept+'|'+v.name));
const rows=[];
for(let i=headerIdx+1;i<nonEmpty.length;i++){const f=parseCsvLine(nonEmpty[i]);
const dept=hasDeptCol?(f[di]||'').trim():metaDept;
const name=(f[ni]||'').trim();const ar=f[ai]||'';
if(/합계|소계|총계|total|합\s*계/i.test(name+dept+(f[0]||'')))continue;

<button class="btn-secondary action-btn" data-a="csv-import"><span class="action-icon">CSV</span><div><strong>직원등록(csv파일)</strong><span>여러 직원을 파일로 불러옵니다</span></div></button>
</div>
</div>
<div class="card settings-card">
<div class="section-head"><div><div class="section-title">직원 관리</div><div class="section-kicker">부서 ${deptGroups.length}개 · 직원 ${d.active.length}명</div></div></div>
${empSection}
</div>
<div class="card settings-card">
<div class="section-head"><div><div class="section-title">데이터 관리</div><div class="section-kicker">장부 보관, 복원, 전체 초기화</div></div></div>
<div class="section-actions">
<button class="btn-secondary action-btn" data-a="export-safe"><span class="action-icon">↓</span><div><strong>장부 안전 저장</strong><span>현재 시점의 엑셀용 CSV와 복원용 데이터 파일을 함께 저장합니다</span></div></button>
<button class="btn action-btn" data-a="import"><span class="action-icon">↑</span><div><strong>저장한 데이터 불러오기</strong><span>안전 저장해둔 JSON 파일로 데이터를 되돌립니다</span></div></button>
<button class="btn-danger action-btn" data-a="full-reset"><span class="action-icon">!</span><div><strong>전체 초기화</strong></div></button>
</div>
<div class="danger-note">전체 초기화 전에는 최종 백업 파일이 자동으로 생성됩니다.</div>
</div>
<div class="card settings-card">
<div class="section-head"><div><div class="section-title">다자간 확장 (베타)</div><div class="section-kicker">무결성 검증 · 문자 안내 · 개인키 백업</div></div></div>
<div class="section-actions">
<button class="btn-secondary action-btn" data-a="verify-integrity"><span class="action-icon">✓</span><div><strong>무결성 검증</strong><span>거래 해시 체인과 입금·사용·잔액 합계를 대조합니다</span></div></button>
<button class="btn action-btn" data-a="toggle-sms"><span class="action-icon">${state.data.meta.smsEnabled?'ON':'OFF'}</span><div><strong>잔액 문자 안내 ${state.data.meta.smsEnabled?'켜짐':'꺼짐'}</strong><span>차감 후 기기 문자앱으로 잔액 안내(직원명 제외)</span></div></button>
${state.data.meta.smsEnabled?`<button class="btn action-btn" data-a="purge-phones"><span class="action-icon">⌫</span><div><strong>전화번호 일괄 파기</strong><span>저장된 번호 ${state.data.employees.filter(e=>e.phone).length}건 — 정산 종료 시 사용</span></div></button>`:''}
<button class="btn action-btn" data-a="export-key"><span class="action-icon">🔑</span><div><strong>개인키 백업</strong><span>기기 분실 대비 — 암호로 보호된 키 파일 저장 (키: ${state.data.meta.pubKey?'등록됨':'없음'})</span></div></button>
<button class="btn action-btn" data-a="show-pubkey"><span class="action-icon">↗</span><div><strong>공개키 보기</strong><span>담당자/서버 등록용 공개키</span></div></button>
</div>
${state.verifyResult?`<div class="stack" style="margin-top:10px"><div class="meta">해시 체인: ${state.verifyResult.chain.ok?'✅ 정상':'❌ '+state.verifyResult.chain.broken.length+'건 이상'} (검증 ${state.verifyResult.chain.checked}건${state.verifyResult.chain.legacy?', 레거시 '+state.verifyResult.chain.legacy+'건 제외':''})</div><div class="meta">입금합계(선금/충전): ${money(state.verifyResult.deposits)}</div><div class="meta">조정합계: ${money(state.verifyResult.adjustments)} · 취소환급: ${money(state.verifyResult.voids)}</div><div class="meta">사용합계: ${money(state.verifyResult.uses)} · 잔액합계: ${money(state.verifyResult.balanceSum)}</div><div class="meta" style="font-weight:700;color:${state.verifyResult.reconcile?'var(--success)':'var(--danger)'}">대조: ${state.verifyResult.reconcile?'✅ 일치':'❌ 불일치'}</div></div>`:''}
</div>
<div class="card settings-card">
<div class="section-head"><div><div class="section-title">서버 연동 (베타)</div><div class="section-kicker">기관 담당자 신청 수신 — 중계 서버 연결</div></div></div>
<label class="meta" style="display:block;margin-bottom:4px">중계 서버 주소</label>
<input id="relayServer" type="url" value="${esc(state.data.meta.relayServer||'')}" placeholder="https://prepaid-relay.&lt;계정&gt;.workers.dev">
<label class="meta" style="display:block;margin:8px 0 4px">음식점 ID (LOCALDATA 관리번호 또는 지정값)</label>
<div class="inline-form"><input id="relayRestId" type="text" value="${esc(state.data.meta.restaurantId||'')}" placeholder="예: MGT-0001"><button class="btn-primary" data-a="relay-save">저장</button></div>
<div class="section-actions" style="margin-top:10px">
<button class="btn-secondary action-btn" data-a="relay-register"><span class="action-icon">🔑</span><div><strong>공개키 등록</strong><span>이 음식점의 공개키를 서버에 등록(담당자 암호화용)</span></div></button>
<button class="btn action-btn" data-a="relay-inbox"><span class="action-icon">📥</span><div><strong>기관 신청 수신함</strong><span>대기 중인 신청을 확인하고 승인/거절합니다</span></div></button>
</div>
</div>
<div class="card settings-card">
<div class="section-head"><div><div class="section-title">보안</div><div class="section-kicker">앱을 열 때 사용하는 4자리 비밀번호</div></div><button class="small" data-a="change-pin">변경</button></div>
</div>
<div class="card stack"><div class="meta">저장 방식: ${esc(state.mode)}</div><div class="meta">마지막 백업: ${esc(state.data.meta.lastBackupAt?dt(state.data.meta.lastBackupAt):'없음')}</div><div class="meta">직원 수: ${d.active.length}명 (숨김 포함 ${d.employees.length}명)</div><div class="meta">거래 수: ${state.data.transactions.length}건</div><div class="meta">앱 버전: v${APP_VERSION}</div><div class="meta" style="margin-top:8px;font-size:11px;color:#98a2b3;text-align:center">© 2026 선입금대장. All rights reserved.</div></div>`}

// ── Service Worker 등록 ──
if('serviceWorker' in navigator){navigator.serviceWorker.register('./sw.js').catch(()=>{})}

// ── 초기화 ──
async function init(){setBusy('저장소를 준비하는 중입니다.');repo=await makeRepo();if(!repo){clearBusy();qs('app').innerHTML='<div class="pin-screen"><div class="pin-icon" style="background:linear-gradient(135deg,var(--danger),#e74c3c)"><svg viewBox="0 0 24 24" style="width:24px;height:24px;stroke:#fff;fill:none;stroke-width:2"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg></div><div class="pin-title">저장소 오류</div><div class="pin-sub">이 브라우저/기기에서 IndexedDB를 사용할 수 없습니다.<br><br>선입금대장은 안정적인 데이터 저장을 위해<br>IndexedDB가 필수입니다.<br><br><strong>해결 방법:</strong><br>① Chrome 최신 버전을 사용하세요<br>② 시크릿/사생활 모드가 아닌지 확인하세요<br>③ 브라우저 설정에서 저장공간을 확인하세요</div></div>';return}state.mode=repo.modeLabel;state.data=norm(await repo.loadAll());try{await ensureKeyPair()}catch(e){console.error('keygen:',e)}await loadAgencyData(false);if(!state.data.meta.setupComplete&&(state.data.employees.length||state.data.transactions.length)){state.data.meta.setupComplete=true;await repo.apply({meta:{setupComplete:true}})}state.loaded=true;clearBusy();render()}
})();
</script>
</body>
</html>
