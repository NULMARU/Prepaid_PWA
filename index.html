<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#1f4e79">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="manifest" href="manifest.json">
<link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192.png">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<title>선입금대장</title>
<style>
:root{--bg:#f0f2f5;--card:#fff;--line:#e1e5ea;--text:#1b2838;--muted:#5f6d7e;--primary:#1a5276;--primary-soft:#e6f0f8;--primary-dark:#12405f;--primary-glow:rgba(26,82,118,.12);--danger:#c0392b;--danger-soft:#fef0ee;--warn:#c05621;--warn-soft:#fef6ee;--success:#0e7a46;--success-soft:#edf8f2;--surface-warm:#fff7ea;--balance-grad:linear-gradient(135deg,#174579,#1e6e94);--accent-bar:linear-gradient(180deg,var(--primary),#2874a6);--shadow:0 1px 4px rgba(15,23,42,.06),0 1px 2px rgba(15,23,42,.03);--shadow-md:0 4px 12px rgba(15,23,42,.08);--shadow-lg:0 12px 32px rgba(15,23,42,.12);--radius:14px}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}html,body{margin:0;padding:0;overscroll-behavior:none;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Malgun Gothic","Apple SD Gothic Neo","Segoe UI",sans-serif;-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale}body{min-height:100vh}button,input,select{font:inherit}button{border:none;cursor:pointer;border-radius:12px;min-height:52px;transition:transform .1s,opacity .12s}button:active{transform:scale(.97);opacity:.82}input,select{width:100%;min-height:52px;padding:13px 16px;border:1.5px solid var(--line);border-radius:12px;background:#fff;transition:border-color .2s,box-shadow .2s}input:focus,select:focus{border-color:var(--primary);box-shadow:0 0 0 4px var(--primary-glow);outline:none}

/* ─── 레이아웃 ─── */
.app{max-width:900px;margin:0 auto;padding:16px 16px 90px}
.top{position:sticky;top:0;z-index:10;background:rgba(240,242,245,.88);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);padding:14px 0 12px;border-bottom:1px solid rgba(225,229,234,.5)}
.title{display:flex;gap:10px;align-items:start;justify-content:space-between}
.title h1{margin:0;font-size:22px;font-weight:800;letter-spacing:-.4px;background:linear-gradient(135deg,var(--primary),#2874a6);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.sub{margin-top:3px;color:var(--muted);font-size:12px;letter-spacing:.2px}
.tool{display:flex;gap:6px;flex-wrap:wrap}
.tool button{min-height:38px;padding:0 13px;font-size:13px;font-weight:700;border-radius:10px}

/* ─── 버튼 ─── */
.btn{background:#fff;border:1.5px solid var(--line);color:var(--text)}
.btn-primary{background:linear-gradient(135deg,var(--primary),#1e6fa1);color:#fff;border:none;box-shadow:0 2px 6px rgba(26,82,118,.2)}
.btn-secondary{background:var(--primary-soft);color:var(--primary);border:1.5px solid #ccdce8}
.btn-danger{background:var(--danger);color:#fff;border:none}
.btn-warn{background:var(--warn-soft);color:var(--warn);border:1.5px solid #e8c9a0}

/* ─── 카드 ─── */
.stack{display:grid;gap:10px}
.card{background:var(--card);border:1px solid rgba(225,229,234,.7);border-radius:var(--radius);box-shadow:var(--shadow);padding:16px}
.banner{border-left:4px solid}
.banner.warn{background:var(--surface-warm);border-left-color:var(--warn)}
.banner.error{background:var(--danger-soft);border-left-color:var(--danger)}
.settings-card{display:grid;gap:12px}
.section-head{display:flex;justify-content:space-between;align-items:flex-start;gap:12px;margin-bottom:2px}
.section-title{font-size:20px;font-weight:800;line-height:1.25;color:var(--text);position:relative;padding-left:12px}
.section-title::before{content:"";position:absolute;left:0;top:.18em;bottom:.18em;width:4px;border-radius:999px;background:var(--accent-bar)}
.section-kicker{font-size:12px;color:var(--muted);font-weight:700;line-height:1.5}
.section-actions{display:grid;gap:8px}
.action-btn{display:flex;gap:10px;align-items:flex-start;text-align:left;justify-content:flex-start;padding:13px 14px;min-height:58px}
.action-btn .action-icon{width:24px;flex:0 0 24px;text-align:center;font-size:17px;line-height:1.25}
.action-btn strong{display:block;font-size:14px;line-height:1.35}
.action-btn span{display:block;margin-top:2px;font-size:11px;font-weight:400;color:var(--muted);line-height:1.45}
.inline-form{display:flex;gap:8px;align-items:center}
.inline-form input{min-width:0}
.inline-form button{flex:0 0 auto;min-width:84px}
.quick-add-form{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-top:10px}
.quick-add-form input{flex:1 1 120px;min-width:100px}
.quick-add-form button{flex:0 0 auto;min-width:72px}
.phone-row{display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.phone-consent{display:inline-flex;align-items:center;gap:4px;font-size:11px;font-weight:700;color:var(--muted);min-height:32px;padding:0 6px}
.phone-consent input{width:auto;min-height:auto;margin:0;accent-color:var(--primary)}
.phone-consent.disabled{opacity:.5}
.agency-current{display:flex;justify-content:space-between;align-items:center;gap:10px;padding:10px 12px;background:#fafbfd;border:1px solid var(--line);border-radius:10px}
.agency-current-name{font-size:17px;font-weight:800;color:var(--primary);line-height:1.3}
.dept-tags{line-height:2;max-height:140px;overflow:auto;padding:8px;border:1px solid var(--line);border-radius:10px;background:#fff}
.danger-note{font-size:11px;color:var(--danger);line-height:1.5}
@media (max-width:520px){.section-head{display:grid}.inline-form{display:grid}.inline-form button{width:100%}.agency-current{align-items:flex-start}.action-btn{padding:12px}}

/* ─── 부서 그룹 ─── */
.group{display:grid;gap:8px}
.group-head{display:flex;justify-content:space-between;gap:12px;align-items:center;padding-bottom:8px;border-bottom:1.5px solid #eef1f4}
.group-title{font-size:18px;font-weight:800;letter-spacing:-.2px;color:var(--primary)}
.group-meta{color:var(--muted);font-size:12px;font-weight:600}

/* ─── 직원 카드 ─── */
.employee{display:grid;gap:10px}
.employee-main{cursor:pointer;border-radius:10px;padding:4px;margin:-4px;transition:background .15s}
.employee-main:active{background:var(--primary-soft)}
.name{font-size:17px;font-weight:800;line-height:1.3;letter-spacing:-.2px}
.dept,.meta,.note{color:var(--muted);font-size:12px;line-height:1.5}
.bal{margin-top:0;font-size:24px;font-weight:800;color:var(--primary);letter-spacing:-.5px}
.bal.zero{color:#a0aab4}
.bal.negative{color:var(--danger)}
/* 직원 아바타 배지(장식) */
.emp-avatar{flex:0 0 42px;width:42px;height:42px;border-radius:10px;background:var(--primary-soft);color:var(--primary-dark);display:flex;align-items:center;justify-content:center;font-size:19px;font-weight:800;line-height:1;letter-spacing:-.3px}
/* 홈 상태 pill(표시 전용) */
.pill-row{display:flex;gap:6px;flex-wrap:wrap}
.pill{display:inline-flex;align-items:center;padding:7px 13px;border-radius:999px;font-size:12.5px;font-weight:700;line-height:1.35}
.pill-offline{background:#eef1f4;color:var(--muted)}
.pill-relay{background:var(--primary-soft);color:var(--primary)}
/* 홈 퀵액션(보조 버튼) */
.quick-actions{display:flex;gap:8px}
.quick-action{flex:1;min-height:48px;background:#fff;border:1.5px solid var(--line);color:var(--primary);font-size:15px;font-weight:700;display:flex;align-items:center;justify-content:center;gap:6px}
.quick-action:active{background:var(--primary-soft)}

/* ─── 요약/액션 ─── */
.actions{display:flex;gap:8px;flex-wrap:wrap}
.actions button{flex:1;min-width:100px;font-size:16px;font-weight:700}
.summary{display:flex;justify-content:space-between;align-items:center;gap:10px;font-size:15px;font-weight:700;padding:14px 16px;background:var(--balance-grad);color:#fff;border:none;border-radius:12px;margin-top:4px;box-shadow:0 6px 18px rgba(23,69,121,.22)}
.summary>div:first-child{opacity:.9}
.summary .v{color:#fff;font-size:22px;letter-spacing:-.3px;font-weight:800}
.empty{text-align:center;color:var(--muted);padding:32px 16px;line-height:1.7;font-size:15px}

/* ─── 거래 이력 ─── */
.list{display:grid;gap:8px}
.txn{display:grid;gap:6px;padding:10px 0;border-bottom:1px solid #f0f2f5}
.txn:last-child{border-bottom:none}
.txn-top{display:flex;justify-content:space-between;gap:10px;align-items:start}
.txn-title{font-size:15px;font-weight:700;line-height:1.4}
.amt{font-size:20px;font-weight:800;white-space:nowrap;letter-spacing:-.3px}
.amt.in{color:var(--success)}
.amt.out{color:var(--danger)}
.amt.adjust{color:var(--warn)}
.chips{display:flex;gap:6px;flex-wrap:wrap;font-size:12px;color:var(--muted)}
.chip{padding:3px 8px;border-radius:999px;background:var(--primary-soft);color:var(--primary);font-weight:600;font-size:11px}
.thumb{width:80px;height:44px;object-fit:contain;border:1px solid var(--line);border-radius:8px;background:#fff;cursor:pointer;transition:border-color .15s}
.thumb:active{border-color:var(--primary)}

/* ─── 직원 관리 행 ─── */
.row{display:flex;justify-content:space-between;gap:12px;align-items:center;padding:10px 0;border-bottom:1px solid #eef1f4}
.row:last-child{border-bottom:0}
.row .left{flex:1;min-width:0}
.row .right{display:flex;gap:10px;flex-wrap:wrap;justify-content:flex-end}
.small{min-height:44px;padding:0 10px;border:1.5px solid var(--line);background:#fff;font-size:12px;font-weight:700;border-radius:8px}
.hidden-badge{display:inline-flex;align-items:center;padding:2px 7px;border-radius:999px;background:#eef1f4;color:var(--muted);font-size:11px;font-weight:700;margin-left:4px}

/* ─── 하단 탭 ─── */
.nav{position:fixed;left:0;right:0;bottom:0;max-width:900px;margin:0 auto;display:flex;background:rgba(255,255,255,.96);border-top:1px solid rgba(225,229,234,.8);box-shadow:0 -2px 8px rgba(15,23,42,.04);z-index:20;padding-bottom:env(safe-area-inset-bottom,0);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px)}
.nav button{flex:1;min-height:58px;border-radius:0;background:transparent;color:#a0aab4;font-size:11px;font-weight:700;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;transition:color .15s}
.nav button:active{transform:none;opacity:1}
.nav button.active{color:var(--primary)}
.nav button svg{width:22px;height:22px;stroke-width:2;fill:none;stroke:currentColor}

/* ─── 모달 ─── */
.modal-back{position:fixed;inset:0;background:rgba(15,23,42,.45);display:flex;align-items:center;justify-content:center;padding:16px;z-index:40;backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px)}
.modal{width:min(100%,640px);max-height:calc(100vh - 32px);overflow:auto;background:#fff;border-radius:18px;box-shadow:var(--shadow-lg);padding:20px}
.modal h2{margin:0 0 4px;font-size:20px;font-weight:800;letter-spacing:-.3px}
.modal h2::after{content:"";display:block;width:34px;height:3px;margin-top:8px;border-radius:999px;background:var(--accent-bar)}
.modal[style*="text-align:center"] h2::after{margin-left:auto;margin-right:auto}
.help{margin:0 0 14px;color:var(--muted);font-size:13px;line-height:1.6}
.field{display:grid;gap:4px}
.field label{font-size:12px;color:var(--muted);font-weight:700;text-transform:uppercase;letter-spacing:.3px}
.form{display:grid;gap:12px}
.quick{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:8px}
.quick button{font-size:16px;font-weight:700;background:var(--primary-soft);color:var(--primary);border:1.5px solid #ccdce8}
.receipt{display:grid;gap:6px;padding:14px;border:1.5px solid var(--line);border-radius:12px;background:#fafbfd;margin-bottom:12px}
.receipt-row{display:flex;justify-content:space-between;gap:12px;font-size:15px}
.signature{width:100%;height:180px;display:block;background:#fff;touch-action:none}
.sig-box{border:1.5px solid var(--line);border-radius:12px;overflow:hidden}
.namecard{aspect-ratio:1.58/1;min-height:200px;border-radius:18px;background:var(--balance-grad);color:#fff;padding:20px 22px;display:flex;flex-direction:column;justify-content:space-between;box-shadow:var(--shadow-lg);overflow:hidden}
.namecard-shop{font-size:16px;font-weight:800;letter-spacing:-.3px;opacity:.96}
.namecard-body{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;text-align:center;padding:6px 0}
.namecard-who{font-size:19px;font-weight:800;letter-spacing:-.3px;line-height:1.3;word-break:keep-all}
.receipt-bal{font-size:42px;font-weight:900;letter-spacing:-1.2px;line-height:1;text-shadow:0 1px 2px rgba(0,0,0,.18)}
.receipt-bal.neg{color:#ffc2b8}
.receipt-negnote{font-size:14px;font-weight:800;margin-top:6px;color:#ffd7cf}
.receipt-warn{font-size:14px;font-weight:700;line-height:1.55;text-align:center;color:#fff;background:rgba(192,57,43,.6);border:1px solid rgba(255,255,255,.35);border-radius:12px;padding:12px 14px}
.namecard-foot{display:flex;flex-direction:column;gap:3px}
.namecard-date{font-size:12px;font-weight:700;opacity:.92}
.namecard-note{font-size:11px;font-weight:600;opacity:.85;letter-spacing:-.2px;word-break:keep-all}
.modal-actions{display:flex;gap:8px;flex-wrap:wrap;margin-top:16px}
.modal-actions button{flex:1;font-size:16px;font-weight:700}

/* ─── 토스트/로딩 ─── */
.toast{position:fixed;left:50%;top:16px;transform:translateX(-50%);max-width:calc(100vw - 32px);padding:12px 20px;border-radius:14px;background:rgba(27,40,56,.9);color:#fff;box-shadow:var(--shadow-lg);z-index:60;text-align:center;line-height:1.4;font-size:14px;font-weight:600;backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px)}
.busy{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:rgba(255,255,255,.65);z-index:70;backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px)}
.busy>div{background:#fff;padding:24px 36px;border-radius:18px;box-shadow:var(--shadow-lg);font-size:16px;font-weight:700;text-align:center}

/* ─── CSV 미리보기 ─── */
.csv-preview{max-height:280px;overflow-y:auto;margin:12px 0;border:1px solid var(--line);border-radius:10px}
.csv-table{width:100%;border-collapse:collapse;font-size:12px}
.csv-table th{background:var(--primary);color:#fff;padding:8px 10px;text-align:left;position:sticky;top:0;font-weight:600;font-size:11px;text-transform:uppercase;letter-spacing:.3px}
.csv-table td{padding:7px 10px;border-bottom:1px solid #eef1f4}
.csv-table tr.err{background:var(--danger-soft)}
.csv-table tr.err td{color:var(--danger)}

/* ─── 부서 태그/선택 ─── */
.dept-tag{display:inline-flex;align-items:center;gap:4px;padding:4px 10px;border-radius:999px;background:var(--primary-soft);color:var(--primary);font-size:12px;font-weight:600;margin:3px}
.dept-tag button{background:none;border:none;color:var(--danger);font-size:15px;min-height:auto;padding:0 2px;cursor:pointer;border-radius:0}
.dept-picks{display:flex;flex-wrap:wrap;gap:5px;margin-top:6px;max-height:130px;overflow-y:auto}
.dept-pick{padding:5px 11px;border-radius:999px;background:#fff;border:1.5px solid var(--line);color:var(--muted);font-size:12px;font-weight:600;cursor:pointer;white-space:nowrap;transition:all .15s}
.dept-pick.on{background:var(--primary-soft);border-color:var(--primary);color:var(--primary)}
.dept-pick:active{transform:scale(.95)}
.agency-tools{display:grid;gap:8px;margin-top:8px}
.agency-actions{display:flex;gap:8px;flex-wrap:wrap}
.agency-actions button{min-height:38px;font-size:12px;font-weight:700;flex:1}
.dept-checks{display:grid;grid-template-columns:repeat(auto-fit,minmax(132px,1fr));gap:6px;max-height:220px;overflow:auto;padding:8px;border:1px solid var(--line);border-radius:10px;background:#fafbfd}
.dept-check{display:flex;gap:6px;align-items:center;min-height:32px;padding:5px 7px;border-radius:8px;background:#fff;font-size:12px;font-weight:700;color:var(--text);border:1px solid #eef1f4}
.dept-check input{width:auto;min-height:auto;margin:0;accent-color:var(--primary)}

/* ─── 직원 관리 아코디언 ─── */
.mgr-group{border-bottom:1px solid #eef1f4}
.mgr-group:last-child{border-bottom:none}
.mgr-head{display:flex;align-items:center;gap:8px;padding:11px 4px;cursor:pointer;font-weight:700;border-radius:8px;transition:background .15s}
.mgr-head:active{background:var(--bg)}
.mgr-toggle{font-size:10px;color:var(--muted);width:16px;text-align:center;flex-shrink:0}
.mgr-dept{font-size:14px;flex:1}
.mgr-count{font-size:12px;color:var(--muted);font-weight:600}
.mgr-body{padding:0 0 4px 20px}

/* ─── PIN 화면 ─── */
.pin-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:24px;background:linear-gradient(160deg,#f0f2f5 0%,#e6eaf0 100%)}
.pin-icon{width:48px;height:48px;border-radius:14px;background:linear-gradient(135deg,var(--primary),#2874a6);display:flex;align-items:center;justify-content:center;margin-bottom:16px;box-shadow:0 4px 12px rgba(26,82,118,.25)}
.pin-icon svg{width:24px;height:24px;stroke:#fff;fill:none;stroke-width:2}
.pin-title{font-size:20px;font-weight:800;margin-bottom:4px;color:var(--text);letter-spacing:-.3px}
.pin-sub{font-size:13px;color:var(--muted);margin-bottom:28px;text-align:center;line-height:1.5}
.pin-dots{display:flex;gap:14px;margin-bottom:32px}
.pin-dot{width:14px;height:14px;border-radius:50%;border:2px solid #c8ced6;background:#fff;transition:all .2s}
.pin-dot.filled{background:var(--primary);border-color:var(--primary);transform:scale(1.15)}
.pin-dot.error{background:var(--danger);border-color:var(--danger);animation:shake .3s}
.pin-pad{display:grid;grid-template-columns:repeat(3,68px);gap:10px;justify-content:center}
.pin-key{width:68px;height:68px;border-radius:50%;background:#fff;border:1px solid #dce0e6;font-size:22px;font-weight:700;display:flex;align-items:center;justify-content:center;min-height:auto;box-shadow:0 1px 3px rgba(0,0,0,.04);transition:all .1s}
.pin-key:active{background:var(--primary-soft);border-color:var(--primary);transform:scale(.93)}
.pin-key.fn{background:transparent;border:none;font-size:14px;color:var(--muted);font-weight:600;box-shadow:none}
.pin-key.fn:active{background:var(--bg);transform:scale(.95)}
.pin-msg{margin-top:18px;font-size:13px;color:var(--danger);text-align:center;min-height:20px;font-weight:600}
.pin-reset{margin-top:20px;text-align:center}
.pin-reset button{min-height:auto;padding:8px 16px;font-size:12px;color:var(--muted);background:none;border:1px solid var(--line);border-radius:8px}
@keyframes shake{0%,100%{transform:translateX(0)}20%,60%{transform:translateX(-4px)}40%,80%{transform:translateX(4px)}}
@media(max-width:640px){.quick{grid-template-columns:1fr}.actions button,.modal-actions button{min-width:100%}.summary,.txn-top,.receipt-row,.row,.group-head{display:grid}.tool{width:100%}.tool button{flex:1}}

/* ─── 초기 설정 ─── */
.setup{max-width:900px;margin:0 auto;padding:24px 16px 40px}
.setup-head{text-align:center;margin-bottom:24px}
.setup-head h1{font-size:22px;font-weight:800;margin:0 0 4px;background:linear-gradient(135deg,var(--primary),#2874a6);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.setup-head p{color:var(--muted);font-size:13px;margin:0;line-height:1.6}
.setup-step{display:inline-block;padding:4px 14px;border-radius:999px;background:var(--primary-soft);color:var(--primary);font-size:12px;font-weight:700;margin-bottom:12px}
.setup-selected{border:2px solid var(--primary);background:var(--primary-soft);border-radius:12px;padding:14px}
</style>
</head>
<body>
<div id="app"></div>
<input id="restoreFile" type="file" accept="application/json,.json" hidden>
<input id="csvFile" type="file" accept=".csv,.txt" hidden>
<input id="directTransferFile" type="file" accept="application/json,.json" hidden>
<script>
(()=>{
'use strict';

for(const it of plain.items){
const eid=uid();
emps.push({id:eid,dept:combinedDeptLabel(parsed.institution,it.dept),name:str(it.name),note:'',isDeleted:false,phone:'',phoneConsent:false,yearMonth:ym,createdAt:t,updatedAt:t});

}

}catch(e){console.error(e);clearBusy();toast('등록 오류: '+(e.message||''))}
}

// 챌린지 인증(스펙 §서버 계약): /api/challenge 로 받은 RSA-OAEP 암호문을 내 개인키로 복호화해 auth_token 문자열 획득
async function relayAuthToken(){const base=relayBase(),rid=str(state.data.meta.restaurantId);if(!rid)throw new Error('가게가 등록되지 않았습니다.');const r=await fetch(base+'/api/challenge',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({restaurant_id:rid})});const j=await r.json().catch(()=>({}));if(!r.ok||!j.challenge_ct)throw new Error(j.error||'인증 챌린지 오류');const priv=await getPrivateKey();if(!priv)throw new Error('가게 열쇠가 없습니다');const raw=await crypto.subtle.decrypt({name:'RSA-OAEP'},priv,b64ToBuf(j.challenge_ct));return new TextDecoder().decode(raw)}
// 클라우드 원장 백업(암호화, 선택) — 기관 신청 blob과 동일한 하이브리드 구조(AES-256-GCM + RSA-OAEP 래핑), 서버는 평문을 볼 수 없음
// 전화번호는 이 기기(로컬)에만 저장 — 클라우드 백업(서버 전송 경로)에는 절대 포함하지 않는다. 로컬 JSON "장부 안전 저장" 파일에는 그대로 남지만, 그 파일은 기기 밖으로 나가지 않는 한 서버로 전송되지 않는다.
function stripPhonesForCloud(core){return{...core,payload:{...core.payload,employees:core.payload.employees.map(({phone,phoneConsent,...rest})=>rest)}}}
async function buildCloudBackupBlob(){if(!state.data.meta.pubKey)throw new Error('키가 없습니다.');const core=stripPhonesForCloud(backupCore());const plaintext=JSON.stringify(core);const aesRaw=randBytes(32);const aesKey=await crypto.subtle.importKey('raw',aesRaw,{name:'AES-GCM'},false,['encrypt']);const iv=randBytes(12);const ct=await crypto.subtle.encrypt({name:'AES-GCM',iv},aesKey,new TextEncoder().encode(plaintext));const pub=await crypto.subtle.importKey('spki',b64ToBuf(state.data.meta.pubKey),{name:'RSA-OAEP',hash:'SHA-256'},true,['encrypt']);const encKey=await crypto.subtle.encrypt({name:'RSA-OAEP'},pub,aesRaw);return{encKey:bufToB64(encKey),iv:bufToB64(iv),ct:bufToB64(ct)}}
async function relayBackupNow(){if(!navigator.onLine){toast('인터넷 연결을 확인해 주세요.');return}if(!relayRegistered()){toast('먼저 우리 가게를 등록하세요.');return}setBusy('장부 되찾기용 백업을 만드는 중입니다.');try{const blob=await buildCloudBackupBlob();const blobB64=btoa(JSON.stringify(blob));if(blobB64.length>1000000){clearBusy();toast('장부 용량이 커서 백업을 만들 수 없어요.');return}const blobHash=await hash(blobB64);const rid=str(state.data.meta.restaurantId);const authToken=await relayAuthToken();const r=await fetch(relayBase()+'/api/ledger-backup',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({restaurant_id:rid,auth_token:authToken,blob:blobB64,blob_hash:blobHash})});const j=await r.json().catch(()=>({}));if(!r.ok)throw new Error(j.error||'백업 실패');const at=now();state.data.meta.lastCloudBackupAt=at;await repo.apply({meta:{lastCloudBackupAt:at}});clearBusy();render();toast('장부를 안전하게 저장했어요.')}catch(e){console.error(e);clearBusy();toast('백업 오류: '+(e.message||''))}}
async function relayRestoreFromCloud(){if(!navigator.onLine){toast('인터넷 연결을 확인해 주세요.');return}if(!relayRegistered()){toast('먼저 우리 가게를 등록하세요.');return}if(!window.confirm('보관된 내용으로 복원할까요?\n\n현재 기기의 장부가 백업 시점 내용으로 바뀌어요.'))return;setBusy('보관된 내용을 불러오는 중입니다.');try{const rid=str(state.data.meta.restaurantId);const authToken=await relayAuthToken();const r=await fetch(relayBase()+'/api/ledger-backup/get',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({restaurant_id:rid,auth_token:authToken})});if(r.status===404){clearBusy();toast('보관된 내용이 없어요.');return}const j=await r.json().catch(()=>({}));if(!r.ok)throw new Error(j.error||'복원 실패');if(j.blob_hash){const calc=await hash(j.blob);if(calc!==j.blob_hash){clearBusy();toast('백업 무결성 확인에 실패했습니다.');return}}const blob=JSON.parse(atob(j.blob));const core=await decryptBlob(blob);clearBusy();const ok=await restoreFromParsed(core);if(ok){const at=j.updated_at?(new Date(j.updated_at).getTime()||now()):now();state.data.meta.lastCloudBackupAt=at;await repo.apply({meta:{lastCloudBackupAt:at}});render()}}catch(e){console.error(e);clearBusy();toast('복원 오류: '+(e.message||''))}}

// ── 기관 데이터 v2: 전국 2단 계층(시·도 → 기관). 인덱스(agency-index.json) 로드 후 시·도별 부서 파일은 lazy fetch + 캐시. 실패 시 레거시(agency-departments.json) 폴백. ──
function legacyToV2(legacy){return{schemaVersion:2,updatedAt:str(legacy.updatedAt),scope:str(legacy.scope),regions:[{code:'seoul',name:'서울',deptsFile:null,agencies:(legacy.agencies||[]).map(a=>({id:a.id,name:a.name}))}]}}
function legacyDeptMap(legacy){const m={};(legacy.agencies||[]).forEach(a=>{m[a.id]=Array.isArray(a.departments)?a.departments:[]});return m}
async function loadAgencyData(force){
  // 1차: v2 인덱스
  try{const res=await fetch('./agency-index.json'+(force?'?t='+Date.now():''),{cache:force?'reload':'default'});if(!res.ok)throw new Error('HTTP '+res.status);const data=await res.json();if(!data||!Array.isArray(data.regions))throw new Error('형식 오류');state.agencyData=data;state.agencyError='';if(force)state.deptCache={};restoreAgencySelection();await ensureDeptsForRegion(state.regionSelected,force);return true}
  catch(e){console.warn('agency-index v2 로드 실패 → 레거시 폴백 시도:',e&&e.message);}
  // 2차: 레거시 폴백(서울 단일 시·도로 변환, 부서는 즉시 캐시)
  try{const res=await fetch('./agency-departments.json'+(force?'?t='+Date.now():''),{cache:force?'reload':'default'});if(!res.ok)throw new Error('HTTP '+res.status);const legacy=await res.json();if(!legacy||!Array.isArray(legacy.agencies))throw new Error('형식 오류');state.agencyData=legacyToV2(legacy);state.deptCache={seoul:{updatedAt:str(legacy.updatedAt),source:'agency-departments.json',depts:legacyDeptMap(legacy),failed:false}};state.agencyError='';restoreAgencySelection();return true}
  catch(e2){console.error('agency data:',e2);state.agencyError='기관 목록을 불러올 수 없습니다.';return false}
}
function regionList(){return(state.agencyData&&state.agencyData.regions)||[]}
function selectedRegion(){const rs=regionList();return rs.find(r=>r.code===state.regionSelected)||rs[0]||null}
function selectedAgency(){const r=selectedRegion();if(!r)return null;const list=r.agencies||[];return list.find(a=>a.id===state.agencySelected)||list[0]||null}
// 저장된 orgName(기관명 문자열)으로 시·도+기관을 역추적해 초기 선택 복원. 없으면 서울(없으면 첫 시·도) 기본.
function restoreAgencySelection(){const rs=regionList();if(!rs.length)return;const savedOrg=str(state.data&&state.data.meta&&state.data.meta.orgName);if(savedOrg){for(const r of rs){const a=(r.agencies||[]).find(x=>x.name===savedOrg);if(a){state.regionSelected=r.code;state.agencySelected=a.id;return}}}const curR=rs.find(r=>r.code===state.regionSelected);if(curR){if((curR.agencies||[]).some(a=>a.id===state.agencySelected))return;state.agencySelected=(curR.agencies&&curR.agencies[0]&&curR.agencies[0].id)||'';return}const def=rs.find(r=>r.code==='seoul')||rs[0];state.regionSelected=def.code;state.agencySelected=(def.agencies&&def.agencies[0]&&def.agencies[0].id)||''}
// 시·도 부서 파일 lazy fetch + 메모리 캐시. 실패 시 실패 플래그를 남겨 UI에서 기본 목록 안내.
async function ensureDeptsForRegion(code,force){code=str(code);if(!code)return true;if(!force&&state.deptCache[code])return true;const region=regionList().find(r=>r.code===code);if(!region)return false;if(!region.deptsFile&&state.deptCache[code])return true;const fileRef=region.deptsFile||('agency-depts/'+code+'.json');const url='./'+(fileRef.indexOf('/')>=0?fileRef:('agency-depts/'+fileRef));try{const res=await fetch(url+(force?'?t='+Date.now():''),{cache:force?'reload':'default'});if(!res.ok)throw new Error('HTTP '+res.status);const data=await res.json();const depts=(data&&data.depts&&typeof data.depts==='object')?data.depts:{};state.deptCache[code]={updatedAt:str(data&&data.updatedAt),source:str(data&&data.source),depts,failed:false};return true}catch(e){console.error('depts load ('+code+'):',e&&e.message);state.deptCache[code]={updatedAt:'',source:'',depts:{},failed:true};return false}}
// 선택 기관의 부서 목록: 부서 파일에 해당 agencyId가 있으면 그 목록, 없으면 COMMON_DEPTS 템플릿 폴백.
function agencyDeptEntry(regionCode,agencyId){const cache=state.deptCache[regionCode];if(cache&&cache.depts&&Array.isArray(cache.depts[agencyId]))return cache.depts[agencyId];return null}

const REGION_ALIASES=[

];
// 기관명에서 시군구 매칭 키 추출(끝의 '청' 제거): 광진구청→광진구, 중구청→중구, 고성군청→고성군
function districtKey(name){name=str(name);if(/청$/.test(name))name=name.slice(0,-1);return name}
// ① 주소에서 시·도 판별(긴 별칭 우선). 데이터 region.code 또는 region.name과 매칭.
function detectRegionFromText(text){const rs=regionList();let best=null,bestLen=0;for(const entry of REGION_ALIASES){for(const nm of entry.names){if(nm.length>bestLen&&text.includes(nm)){const region=rs.find(r=>r.code===entry.code)||rs.find(r=>entry.names.includes(r.name));if(region){best=region;bestLen=nm.length}}}}for(const r of rs){if(r.name&&r.name.length>bestLen&&text.includes(r.name)){best=r;bestLen=r.name.length}}return best}
// ② 특정 시·도 안에서 시군구명 매칭(광역청=첫 항목 제외, 긴 이름 우선)
function matchAgencyInRegion(region,text){const cands=(region.agencies||[]).slice(1).map(a=>({a,key:districtKey(a.name)})).filter(x=>x.key).sort((x,y)=>y.key.length-x.key.length);for(const c of cands){if(text.includes(c.key))return c.a}return null}
// ③ 시·도 판별 실패 시: 시군구명이 전국에서 유일할 때만 매칭(중복명은 포기)
function matchUniqueDistrict(text){const map=new Map();for(const r of regionList()){(r.agencies||[]).slice(1).forEach(a=>{const k=districtKey(a.name);if(!k)return;if(!map.has(k))map.set(k,[]);map.get(k).push({region:r,agency:a})})}const keys=[...map.keys()].sort((a,b)=>b.length-a.length);for(const k of keys){if(text.includes(k)){const arr=map.get(k);return arr.length===1?arr[0]:null}}return null}
// 가게 주소에서 시·도→시군구 2단계로 담당 기관 자동 매칭. 반환 {region,agency} 또는 null(오매칭보다 미매칭 우선).
function matchAgencyByRegion(text){text=str(text);if(!text||!state.agencyData)return null;const region=detectRegionFromText(text);if(region){const agency=matchAgencyInRegion(region,text);return agency?{region,agency}:null}const uniq=matchUniqueDistrict(text);return uniq?{region:uniq.region,agency:uniq.agency}:null}

ncy-add-all" data-ctx="${ctx}">선택 기관 과 전체 추가</button><button class="btn" data-a="agency-remove-all" data-ctx="${ctx}">선택 기관 과 제거</button><button class="btn" data-a="agency-refresh">목록 새로고침</button></div>${failNote}<div class="dept-checks">${checks}</div><div class="meta">${basis} · 동주민센터 제외 · 과 단위만 제공</div></div>`}

async function handlePinKey(key){
if(key==='clear'){state.pinInput='';state.pinMsg='';render();return}
if(key==='back'){state.pinInput=state.pinInput.slice(0,-1);state.pinMsg='';render();return}
if(state.pinInput.length>=4)return;
state.pinInput+=key;state.pinMsg='';render();
if(state.pinInput.length<4)return;
const pin=state.pinInput;const hasPin=!!state.data.meta.pinHash;
const isSetup=!hasPin||state.pinMode==='change';
if(isSetup){
if(!state.pinSetup1){state.pinSetup1=pin;state.pinInput='';render();return}
if(state.pinSetup1!==pin){state.pinSetup1='';state.pinInput='';state.pinMsg='비밀번호가 일치하지 않습니다. 다시 설정하세요.';render();return}
const h=await hash(pin);state.data.meta.pinHash=h;await repo.apply({meta:{pinHash:h}});
state.pinInput='';state.pinSetup1='';state.pinMode='';state.pinLocked=false;state.pinFails=0;state.pinMsg='';render();toast('비밀번호가 설정되었습니다.')
}else{
const h=await hash(pin);
if(h===state.data.meta.pinHash){state.pinInput='';state.pinLocked=false;state.pinFails=0;state.pinMsg='';render()}
else{state.pinFails++;state.pinInput='';state.pinMsg=`비밀번호가 틀렸습니다. (${state.pinFails}회)`;render()}}}

function activateModalA11y(shouldFocus){const back=document.querySelector('.modal-back');if(!back)return;const modal=back.querySelector('.modal');if(!modal)return;modal.setAttribute('role','dialog');modal.setAttribute('aria-modal','true');if(!modal.hasAttribute('tabindex'))modal.setAttribute('tabindex','-1');const items=focusablesIn(modal);if(shouldFocus){if(items.length)items[0].focus();else modal.focus()}if(modalKeydownHandler)document.removeEventListener('keydown',modalKeydownHandler);modalKeydownHandler=function(e){if(e.key==='Escape'){state.modal=null;render();return}if(e.key!=='Tab')return;const list=focusablesIn(modal);if(!list.length)return;const first=list[0],last=list[list.length-1];if(e.shiftKey&&document.activeElement===first){e.preventDefault();last.focus()}else if(!e.shiftKey&&document.activeElement===last){e.preventDefault();first.focus()}};document.addEventListener('keydown',modalKeydownHandler)}

function derive(){const balances=new Map(),voided=new Set();const asc=[...state.data.transactions].sort((a,b)=>a.createdAt-b.createdAt||a.id.localeCompare(b.id));asc.forEach(t=>{const p=balances.get(t.employeeId)||0;balances.set(t.employeeId,applyTx(p,t));if(t.type==='void'&&t.targetTransactionId)voided.add(t.targetTransactionId)});const employees=state.data.employees.map(e=>({...e,balance:balances.get(e.id)||0,deptKey:e.dept||'부서 없음'})).sort((a,b)=>a.deptKey.localeCompare(b.deptKey,'ko')||a.name.localeCompare(b.name,'ko'));const empMap=new Map(employees.map(e=>[e.id,e]));const active=employees.filter(e=>!e.isDeleted);const kw=state.search.trim();const df=state.deptFilter;const filtered=active.filter(e=>{if(df&&e.deptKey!==df)return false;if(kw&&!e.name.includes(kw))return false;return true});const total=active.reduce((s,e)=>s+e.balance,0);const homeGroups=groupBy(filtered,e=>e.deptKey).map(([dept,items])=>({dept,items,count:items.length,totalBalance:items.reduce((s,e)=>s+e.balance,0)})).sort((a,b)=>a.dept.localeCompare(b.dept,'ko'));const hist=[...state.data.transactions].sort((a,b)=>b.createdAt-a.createdAt||b.id.localeCompare(a.id)).filter(t=>!state.historyEmployeeId||t.employeeId===state.historyEmployeeId);const historyGroups=groupBy(hist,t=>{const e=empMap.get(t.employeeId);return(e?e.deptKey:'부서 없음')+'||'+(e?e.name:'알 수 없는 직원')+'||'+t.employeeId}).map(([key,items])=>{const[dept,name,eid]=key.split('||');return{dept,name,employeeId:eid,employee:empMap.get(eid)||null,items}}).sort((a,b)=>a.dept.localeCompare(b.dept,'ko')||a.name.localeCompare(b.name,'ko'));const dateHist=[...state.data.transactions].sort((a,b)=>b.createdAt-a.createdAt||b.id.localeCompare(a.id));const dateKey=ts=>{const x=new Date(ts);return `${x.getFullYear()}.${String(x.getMonth()+1).padStart(2,'0')}.${String(x.getDate()).padStart(2,'0')}`};const dateGroups=groupBy(dateHist,t=>dateKey(t.createdAt)).map(([date,items])=>{const useTotal=items.filter(t=>t.type==='use'&&!voided.has(t.id)).reduce((s,t)=>s+num(t.amount),0);return{date,items,useTotal,count:items.length}});return{employees,empMap,active,filtered,total,homeGroups,voided,historyGroups,dateGroups}}

function statusPillsHtml(){const pills=[];if(!navigator.onLine)pills.push(`<span class="pill pill-offline">오프라인 — 장부는 계속 쓸 수 있어요</span>`);if(relayRegistered())pills.push(`<span class="pill pill-relay">구청 선금 받는 중</span>`);return pills.length?`<div class="pill-row">${pills.join('')}</div>`:''}

function historyHtml(d){if(state.historyTab==='employee')return historyByEmployee(d);return historyByDate(d)}
function historyByDate(d){if(!d.dateGroups.length)return '<div class="card empty">거래 이력이 없습니다.<br>홈 화면에서 직원을 골라 [사용]을 눌러 등록해 보세요.</div>';return d.dateGroups.map(g=>`<div class="card"><div style="display:flex;justify-content:space-between;align-items:center;gap:8px;padding-bottom:8px;border-bottom:1.5px solid #eef1f4"><div class="name" style="font-size:16px">${esc(g.date)}</div><div style="font-size:12px;color:var(--muted)">${g.count}건${g.useTotal?` · 사용 ${money(g.useTotal)}`:''}</div></div><div class="list">${g.items.map(t=>txCardDate(t,d)).join('')}</div></div>`).join('')}
function txCardDate(t,d){const e=d.empMap.get(t.employeeId);const eName=e?e.name:'알 수 없음';const eDept=e?e.deptKey:'';const lbl={open:'등록',topup:'충전',use:'사용',void:'취소',adjust:'조정'}[t.type]||t.type;const isOut=t.type==='use';const isAdj=t.type==='adjust';const isV=d.voided.has(t.id);const adjNeg=isAdj&&num(t.amount)<0;const sign=isOut?'-':adjNeg?'':'+';const cls=isOut?'out':isAdj?'adjust':'in';const sig=t.signatureData?`<img class="thumb" src="${t.signatureData}" data-a="view-sign" data-id="${esc(t.id)}" alt="서명">`:'';const vb=t.type==='use'&&!isV?`<button class="small" data-a="void" data-id="${esc(t.id)}">취소</button>`:'';const vm=isV?'<span class="chip" style="background:var(--danger-soft);color:var(--danger)">취소됨</span>':'';const nt=t.note?`<span class="chip">${esc(t.note)}</span>`:'';const time=new Date(t.createdAt);const hm=String(time.getHours()).padStart(2,'0')+':'+String(time.getMinutes()).padStart(2,'0');return `<div class="txn" style="${isV?'opacity:.5':''}"><div class="txn-top"><div><div class="txn-title">${esc(eName)} <span style="font-weight:400;color:var(--muted);font-size:11px">${esc(eDept)} · ${esc(lbl)}</span></div></div><div class="amt ${cls}">${sign}${money(isAdj?t.amount:Math.abs(t.amount))}</div></div><div class="chips"><span>${hm}</span>${nt}${vm}${t.reason&&t.type!=='use'?`<span>${esc(t.reason)}</span>`:''}</div>${sig}${vb}</div>`}
function historyByEmployee(d){if(!d.historyGroups.length)return '<div class="card empty">거래 이력이 없습니다.<br>홈 화면에서 직원을 골라 [사용]을 눌러 등록해 보세요.</div>';return d.historyGroups.map(g=>{const emp=g.employee;const bal=emp?emp.balance:0;const canAdjust=emp&&!emp.isDeleted;return `<div class="card"><div style="display:flex;justify-content:space-between;align-items:center;gap:8px"><div class="name">${esc(g.name)}<span class="dept" style="margin-left:8px">${esc(g.dept)}</span></div><div style="display:flex;align-items:center;gap:8px"><div style="font-size:22px;font-weight:800;color:var(--danger);white-space:nowrap">잔액 ${money(bal)}</div>${canAdjust?`<button class="small" data-a="adjust" data-id="${esc(g.employeeId)}">조정</button>`:''}</div></div><div class="list">${g.items.map(t=>txCard(t,d)).join('')}</div></div>`}).join('')}
function txCard(t,d){const lbl={open:'등록',topup:'충전',use:'사용',void:'취소',adjust:'조정'}[t.type]||t.type;const isOut=t.type==='use';const isAdj=t.type==='adjust';const isV=d.voided.has(t.id);const adjNeg=isAdj&&num(t.amount)<0;const sign=isOut?'-':adjNeg?'':'+';const cls=isOut?'out':isAdj?'adjust':'in';const displayAmt=isAdj?money(t.amount):money(Math.abs(t.amount));const sig=t.signatureData?`<img class="thumb" src="${t.signatureData}" data-a="view-sign" data-id="${esc(t.id)}" alt="서명">`:'';const vb=t.type==='use'&&!isV?`<button class="small" data-a="void" data-id="${esc(t.id)}">취소</button>`:'';const vm=isV?'<span class="chip" style="background:var(--danger-soft);color:var(--danger)">취소됨</span>':'';const nt=t.note?`<span class="chip">${esc(t.note)}</span>`:'';return `<div class="txn" style="${isV?'opacity:.5':''}"><div class="txn-top"><div class="txn-title">${esc(lbl)}</div><div class="amt ${cls}">${sign}${displayAmt}</div></div><div class="chips"><span style="font-size:14px;font-weight:600">${dt(t.createdAt)}</span>${nt}${vm}${t.reason&&t.type!=='use'?`<span>${esc(t.reason)}</span>`:''}</div>${sig}${vb}</div>`}

if(state.modal.type==='inbox'){const items=state.modal.items||[];const body=items.length?items.map(it=>`<div style="border:1px solid var(--line);border-radius:10px;padding:10px;margin-bottom:8px"><div style="font-weight:700">${esc(it.summary.restaurant_name||'')} · ${esc(it.summary.department)}</div><div class="meta">${esc(it.summary.institution||'')} · ${esc(it.summary.year_month||'')}</div><div style="margin:6px 0">총액 <b>${money(it.summary.total_amount)}</b> · ${num(it.summary.member_count)}명 <span class="meta">(승인 전에는 이름이 보이지 않습니다)</span></div><div style="display:flex;gap:8px"><button class="btn-primary" data-a="relay-approve" data-sid="${esc(it.summary_id)}">통장 확인 후 승인</button><button class="btn-danger" data-a="relay-reject" data-sid="${esc(it.summary_id)}">거절</button></div></div>`).join(''):'<div class="empty">대기 중인 신청이 없습니다.<br>기관에서 신청을 보내면 여기에 나타나요.</div>';return `<div class="modal-back"><div class="modal"><h2>기관 신청 수신함</h2><p class="help">통장에서 입금자명·금액을 대조한 뒤 승인하세요. 승인 시에만 명단이 열립니다.</p>${body}<div class="modal-actions"><button class="btn" data-a="relay-inbox">새로고침</button><button class="btn" data-a="close-modal">닫기</button></div></div></div>`}
if(state.modal.type==='qr-scan'){return `<div class="modal-back"><div class="modal" style="text-align:center"><h2>QR(사각 코드)로 받기</h2><p class="help">담당자가 보여주는 QR(사각 코드)를 카메라로 비춰주세요. 서버를 거치지 않고 바로 등록돼요.</p><video id="qrVideo" autoplay playsinline muted style="width:100%;border-radius:12px;background:#000;aspect-ratio:3/4;object-fit:cover"></video><div class="modal-actions"><button class="btn" data-a="close-modal">취소</button></div></div></div>`}

// 잔액증표(명함형) — 표시 전용. 잔액은 derive() 결과만 사용(별도 계산 금지).
function receiptCardHtml(d){const e=d.empMap.get(state.modal.id);if(!e)return '';const shop=state.data.meta.shopName||APP;const who=e.dept?`${esc(e.dept)} ${esc(e.name)}님`:`${esc(e.name)}님`;const x=new Date(now());const dateStr=`${x.getFullYear()}.${String(x.getMonth()+1).padStart(2,'0')}.${String(x.getDate()).padStart(2,'0')}`;const integrityBad=state.modal.integrityOk===false||state.modal.crossOk===false;let balBlock;if(integrityBad){balBlock=`<div class="receipt-warn">장부에 이상이 있어 잔액을 표시할 수 없습니다.<br>설정 → 장부 검사를 확인하세요.</div>`}else{const neg=e.balance<0;balBlock=`<div class="receipt-bal${neg?' neg':''}">${money(e.balance)}${neg?'<div class="receipt-negnote">확인 필요</div>':''}</div>`}return `<div class="modal-back"><div class="modal receipt-modal"><div class="namecard"><div class="namecard-shop">${esc(shop)}</div><div class="namecard-body"><div class="namecard-who">${who}</div>${balBlock}</div><div class="namecard-foot"><div class="namecard-date">${dateStr}</div><div class="namecard-note">${esc(shop)} 전용 · 잔액 확인용 · 양도 불가</div></div></div><div class="modal-actions"><button class="btn" data-a="close-modal">닫기</button></div></div></div>`}

// 증표 열기 — 3중 안전장치: ①derive balance만 사용 ②해시체인 재검증 ③시간순 applyTx 누적 교차검증
async function openReceipt(id){let integrityOk=true,crossOk=true;try{const chain=await verifyChain();integrityOk=chain.ok}catch(err){console.error('receipt verify',err);integrityOk=false}try{const d=derive();const e=d.empMap.get(id);if(e){const txs=state.data.transactions.filter(t=>t.employeeId===id).sort((a,b)=>a.createdAt-b.createdAt||(a.id<b.id?-1:a.id>b.id?1:0));const recomputed=txs.reduce((s,t)=>applyTx(s,t),0);crossOk=recomputed===e.balance}}catch(err){console.error('receipt cross-check',err);crossOk=false}state.modal={type:'receipt',id,integrityOk,crossOk};render()}

function backupCore(){const{deviceSecret,privKeyWrapped,pinHash,...metaSafe}=state.data.meta;return{schemaVersion:3,appName:APP,appVersion:APP_VERSION,exportedAt:now(),payload:{employees:state.data.employees,transactions:state.data.transactions,meta:metaSafe}}}
function backupSummary(data){return{employeeCount:data.employees.filter(v=>!v.isDeleted).length,totalEmployeeCount:data.employees.length,transactionCount:data.transactions.length}}
async function buildBackupPayload(){const core=backupCore();const checksum=await hash(JSON.stringify(core));return{...core,summary:backupSummary(core.payload),checksum}}
function parseBackupPayload(parsed){if(!parsed||typeof parsed!=='object')throw new Error('형식 오류');if((parsed.schemaVersion===2||parsed.schemaVersion===3)&&parsed.payload&&Array.isArray(parsed.payload.employees)&&Array.isArray(parsed.payload.transactions)){const core={schemaVersion:parsed.schemaVersion,appName:parsed.appName,appVersion:parsed.appVersion,exportedAt:parsed.exportedAt,payload:parsed.payload};return{version:parsed.schemaVersion,checksum:parsed.checksum||'',core,data:parsed.payload}}if(Array.isArray(parsed.employees)&&Array.isArray(parsed.transactions)){const core={version:parsed.version,appName:parsed.appName,appVersion:parsed.appVersion,exportedAt:parsed.exportedAt,employees:parsed.employees,transactions:parsed.transactions,meta:parsed.meta||{}};return{version:1,checksum:parsed.checksum||'',core,data:{employees:parsed.employees,transactions:parsed.transactions,meta:parsed.meta||{}}}}throw new Error('지원하지 않는 백업 형식')}
function validateRestoreData(data){const errors=[],warnings=[],empIds=new Set(),txIds=new Set(),allowed=new Set(['open','topup','use','void','adjust']);data.employees.forEach((e,i)=>{if(!e.id)errors.push(`직원 ${i+1}: ID 없음`);if(!e.name)errors.push(`직원 ${i+1}: 이름 없음`);if(empIds.has(e.id))errors.push(`직원 ID 중복: ${e.id}`);empIds.add(e.id)});data.transactions.forEach((t,i)=>{if(!t.id)errors.push(`거래 ${i+1}: ID 없음`);if(txIds.has(t.id))errors.push(`거래 ID 중복: ${t.id}`);txIds.add(t.id);if(!allowed.has(t.type))errors.push(`거래 ${i+1}: 알 수 없는 유형 ${t.type}`);if(!empIds.has(t.employeeId))errors.push(`거래 ${i+1}: 직원 참조 없음`);if(!Number.isInteger(num(t.amount)))errors.push(`거래 ${i+1}: 금액이 정수가 아님`);if(['open','topup','use','void'].includes(t.type)&&num(t.amount)<=0)errors.push(`거래 ${i+1}: 금액은 1원 이상이어야 함`);if(t.type==='adjust'&&num(t.amount)===0)warnings.push(`거래 ${i+1}: 조정 금액이 0원입니다.`)});data.transactions.forEach((t,i)=>{if(t.type==='void'&&t.targetTransactionId&&!txIds.has(t.targetTransactionId))errors.push(`거래 ${i+1}: 취소 대상 거래가 없습니다.`)});const balances=new Map();[...data.transactions].sort((a,b)=>a.createdAt-b.createdAt||a.id.localeCompare(b.id)).forEach((t,i)=>{const before=balances.get(t.employeeId)||0,after=applyTx(before,t);if(num(t.beforeBalance)!==before||num(t.afterBalance)!==after)warnings.push(`거래 ${i+1}: 저장된 전후 잔액과 재계산 잔액이 다릅니다.`);balances.set(t.employeeId,after)});return{errors,warnings}}

async function exportCsvLedger(opts){
opts=opts||{};
const d=derive();const org=state.data.meta.orgName||DEFAULT_ORG;
const today=new Date();const dateStr=`${today.getFullYear()}.${String(today.getMonth()+1).padStart(2,'0')}.${String(today.getDate()).padStart(2,'0')}`;
const csvQ=v=>{const s=String(v==null?'':v);return s.includes(',')||s.includes('"')||s.includes('\n')?'"'+s.replace(/"/g,'""')+'"':s};
const row=arr=>arr.map(csvQ).join(',')+'\r\n';
let csv='';
// ── 1. 요약 정보 ──
csv+=row([`${org} 선입금 장부`,'','',`출력일: ${dateStr}`]);
csv+=row([`활성 직원: ${d.active.length}명`,'',`총 잔액: ${money(d.total)}`,'']);
csv+=row([]);
// ── 2. 직원별 잔액 현황 ──
csv+=row(['【 직원별 잔액 현황 】','','','']);
csv+=row(['부서','직원명','잔액','메모']);
d.homeGroups.forEach(g=>{
g.items.forEach(e=>{csv+=row([e.dept,e.name,num(e.balance),e.note||''])});
csv+=row([`  ${g.dept} 소계`,'',num(g.totalBalance),'']);
});
csv+=row(['합계','',num(d.total),'']);
csv+=row([]);
// ── 3. 거래 내역 ──
csv+=row(['【 거래 내역 】','','','','','']);
csv+=row(['일시','부서','직원명','유형','금액','잔액(후)','비고/사유']);
const typeNames={open:'등록',topup:'충전',use:'사용',void:'취소',adjust:'조정'};
const allTx=[...state.data.transactions].sort((a,b)=>a.createdAt-b.createdAt);
allTx.forEach(t=>{
const e=state.data.employees.find(v=>v.id===t.employeeId);
const dept=e?e.dept:'';const name=e?e.name:'알 수 없음';
const typeName=typeNames[t.type]||t.type;
const sign=t.type==='use'?'-':(t.type==='adjust'&&num(t.amount)<0?'':'');
const memo=[t.note,t.reason].filter(Boolean).join(' / ');
const isVoided=state.data.transactions.some(v=>v.type==='void'&&v.targetTransactionId===t.id);
const displayAmount=t.type==='adjust'?num(t.amount):num(Math.abs(t.amount));
csv+=row([dt(t.createdAt),dept,name,typeName+(isVoided?' (취소됨)':''),sign+displayAmount,num(t.afterBalance),memo]);
});
csv+=row([]);
csv+=row([`총 거래 ${allTx.length}건`,'','','','','','']);
// BOM + UTF-8로 다운로드 (엑셀에서 한글 깨짐 방지)
const bom='\uFEFF';
const blob=new Blob([bom+csv],{type:'text/csv;charset=utf-8'});
const fn=`선입금장부_${org}_${today.getFullYear()}-${String(today.getMonth()+1).padStart(2,'0')}-${String(today.getDate()).padStart(2,'0')}.csv`;
downloadBlob(blob,fn);

async function onCsvFile(e){const file=e.target.files&&e.target.files[0];if(!file)return;try{
// 인코딩 자동 감지: UTF-8 → EUC-KR 폴백
const buf=await file.arrayBuffer();let text;
try{text=new TextDecoder('utf-8',{fatal:true}).decode(buf)}catch(ue){try{text=new TextDecoder('euc-kr',{fatal:true}).decode(buf)}catch(ke){toast('파일 인코딩을 인식할 수 없습니다.');return}}

const allLines=text.split(/\r?\n/);const nonEmpty=allLines.filter(l=>l.trim());

// 메타데이터에서 부서명 추출 (예: "급량비(보건의료과)" 또는 "부서: 보건의료과")
let metaDept='';
for(let i=0;i<Math.min(nonEmpty.length,5);i++){const l=nonEmpty[i];
const m1=l.match(/부서\s*[:：]\s*(.+)/);if(m1){metaDept=m1[1].trim().replace(/,.*$/,'');break}
const m2=l.match(/[급량비비용]\(([^)]+)\)/);if(m2){metaDept=m2[1].trim();break}
const m3=l.match(/\(([가-힣]+[과동부국소])\)/);if(m3&&!metaDept){metaDept=m3[1].trim()}}

// 헤더 행 찾기 (첫 번째로 '이름|성명|직원' 컬럼이 있는 행)
let headerIdx=-1,headers=[];
for(let i=0;i<Math.min(nonEmpty.length,10);i++){const cols=parseCsvLine(nonEmpty[i]).map(h=>h.replace(/\s/g,''));
if(cols.some(h=>/이름|성명|직원명/.test(h))&&cols.some(h=>/금액|선입금|입금/.test(h))){headerIdx=i;headers=cols;break}}
if(headerIdx<0){toast('이름·금액 칸을 찾을 수 없어요.\n첫 줄(제목 줄)이 있는지 확인해 주세요.');return}

// 컬럼 매핑 (부서 컬럼은 선택적)
const di=headers.findIndex(h=>/부서/.test(h));
const ni=headers.findIndex(h=>/이름|성명|직원명/.test(h));
const ai=headers.findIndex(h=>/금액|선입금|입금/.test(h));
if(ni<0||ai<0){toast('이름·금액 칸을 찾을 수 없어요.');return}

// 부서 컬럼이 없으면 메타데이터에서 추출한 부서 사용
const hasDeptCol=di>=0;
if(!hasDeptCol&&!metaDept){
// 마지막 시도: 파일 전체에서 "부서:" 패턴 찾기
for(const l of nonEmpty){const m=l.match(/부서\s*[:：]\s*(.+)/);if(m){metaDept=m[1].trim().replace(/,.*$/,'');break}}}

// 데이터 행 파싱
const ex=new Set(state.data.employees.filter(v=>!v.isDeleted).map(v=>v.dept+'|'+v.name));
const rows=[];
for(let i=headerIdx+1;i<nonEmpty.length;i++){const f=parseCsvLine(nonEmpty[i]);
const dept=hasDeptCol?(f[di]||'').trim():metaDept;
const name=(f[ni]||'').trim();const ar=f[ai]||'';
if(/합계|소계|총계|total|합\s*계/i.test(name+dept+(f[0]||'')))continue;

else if(ex.has(dept+'|'+name)){mode='topup';const existEmp=state.data.employees.find(v=>!v.isDeleted&&v.dept===dept&&v.name===name);if(existEmp)existId=existEmp.id}

const dupWarn=assignDuplicateSuffix(rows.filter(r=>r.mode!=='error'));state.modal={type:'csv',rows,dupWarn};render()}catch(err){console.error(err);toast('파일 읽기 실패: '+err.message)}finally{qs('csvFile').value=''}}
