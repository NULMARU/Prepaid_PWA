name = "prepaid-relay"
main = "src/worker.js"
compatibility_date = "2026-06-01"

# 담당자 웹/음식점 앱 출처(콤마 구분 화이트리스트). Origin 헤더 없는 요청(curl 등 서버간 호출)은 차단되지 않음.
[vars]
ALLOW_ORIGIN = "https://nulmaru.github.io,https://prepaid-agency.pages.dev,https://bapjangbu.com,https://www.bapjangbu.com"
# data.go.kr 행정안전부_식품_일반음식점 조회서비스 (/info 오퍼레이션)
PUBLIC_API_BASE = "https://apis.data.go.kr/1741000/general_restaurants/info"
PUBLIC_API_REGION_PARAM = "cond[OPN_ATMY_GRP_CD::EQ]"   # 개방자치단체코드(지역)
PUBLIC_API_NAME_PARAM = "cond[BPLC_NM::LIKE]"           # 사업장명 포함 검색
# AUTH_MODE 세 값: "dev"(로컬 개발 전용 — /api/agency/request-otp 응답에 평문 dev_otp 포함,
# 절대 운영 배포 금지) · "pilot"(베타 운영값 — dev_otp 미노출, 응답 sent:false. 실제 이메일
# 발송 인프라(도메인 인증)가 아직 없어 OTP를 이메일로 받을 방법이 없으므로 agency-web은
# "정식 이메일 인증은 준비 중"이라고 정직하게 표시하고 형식 확인 수준으로만 진행한다) ·
# "prod"(Resend REST API로 실제 이메일 발송, 응답 sent:true — bapjangbu.com 도메인을 Resend에서
# 인증하고 RESEND_API_KEY secret 등록이 완료된 후에만 전환할 것). 베타 운영값: "pilot".
# ※ 도메인 인증 + secret 등록 완료 후 오케스트레이터가 "prod"로 전환·배포한다. 그 전까지는
#    이 값을 "pilot"으로 유지 — RESEND_API_KEY가 등록돼 있어도 AUTH_MODE!=='prod'면 호출되지 않는다.
AUTH_MODE = "prod"
# "1"이면 /api/submit이 유효한 X-Agency-Token 헤더를 요구한다(없거나 무효면 401
# agency_auth_required). OTP 이메일 인증(Resend, AUTH_MODE="prod") 라이브 확인 완료
# (2026-07, .go.kr 실주소로 발송·검증 정상). 담당자 웹은 OTP verify 후 발급받은 토큰을
# X-Agency-Token 헤더에 첨부하므로 정상 사용자는 영향 없음. 직접전달 모드는 서버 미경유라 무관.
REQUIRE_AGENCY_AUTH = "1"

# D1 바인딩. 아래 database_id는 `wrangler d1 create prepaid-relay` 후 출력값으로 교체.
[[d1_databases]]
binding = "DB"
database_name = "prepaid-relay"
database_id = "13cf43c0-5d02-45bd-b00e-032285d5323c"

# 기관 OTP 발송 = Resend API(https://api.resend.com/emails, worker.js의 sendOtpEmail 헬퍼).
# Cloudflare Email Sending(Workers 유료 플랜 필요)은 쓰지 않는다 — Resend 무료 플랜으로 대체.
# 발신 도메인 bapjangbu.com을 Resend 대시보드에서 도메인 인증(DNS 레코드 등록) 완료하고,
# 아래 secret을 등록한 뒤에만 AUTH_MODE를 "prod"로 전환할 것(값은 이 파일에 쓰지 말 것):
#   wrangler secret put RESEND_API_KEY

# TTL 정리 cron: 매일 UTC 18:17(KST 새벽 03:17)에 실행 — 처리 완료 30일 경과 데이터,
# 만료된 인증 챌린지/기관 OTP/기관 토큰을 삭제(개인정보 최소화 목적).
[triggers]
crons = ["17 18 * * *"]

# 비밀키는 파일에 두지 말고 CLI로 등록 (data.go.kr "Decoding(일반)" 키 사용):
#   wrangler secret put PUBLIC_API_KEY

# 관리자 통계 API(/api/admin/stats, X-Admin-Token 헤더) 보호용 시크릿. 미설정이면 해당
# 엔드포인트는 503 admin_not_configured로 잠긴다(기능 비활성). 값은 이 파일에 두지 말 것:
#   wrangler secret put ADMIN_TOKEN
